<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>庫存查詢系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card-bg: #1e293b; --primary: #38bdf8; --accent: #10b981; --text-main: #f1f5f9; --text-dim: #94a3b8; --bright-qty: #ccff00; --alert: #ff4444; --border: rgba(255, 255, 255, 0.1); }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 0; }
        .marquee-container { background: #334155; color: var(--bright-qty); padding: 8px 0; font-weight: bold; font-size: 14px; border-bottom: 1px solid var(--primary); }
        .container { max-width: 900px; margin: 15px auto; background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 1.2rem; color: var(--primary); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 120px; padding: 12px; border: none; border-radius: 12px; background: #334155; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; text-align: center; }
        .tab-btn.active { background: var(--primary); color: #0f172a; }
        .export-btn { background: var(--accent); color: #0f172a; display: none; }
        .search-box { width: 100%; padding: 12px 16px; background: #334155; border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 16px; margin-bottom: 15px; }
        .warning-filters { display: none; margin-bottom: 15px; }
        .warning-group { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 8px; }
        .warning-label { color: var(--text-dim); font-size: 12px; min-width: 80px; }
        .filter-btn { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; background: #334155; color: white; cursor: pointer; font-size: 11px; }
        .filter-btn.active { background: var(--accent); color: #0f172a; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 8px; border-bottom: 2px solid var(--border); color: var(--text-dim); font-size: 13px; cursor: pointer; }
        td { padding: 14px 8px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .qty-tag { background: rgba(204, 255, 0, 0.1); color: var(--bright-qty); padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; }
        .page-btn { background: #475569; border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .expired-row { text-decoration: line-through; color: var(--alert) !important; font-weight: bold; }
    </style>
</head>
<body>
<div class="marquee-container"><marquee scrollamount="5">🚀 系統運行中...</marquee></div>
<div class="container">
    <div class="header"><h2>❄️ 庫存查詢系統</h2></div>
    <div class="tabs">
        <button id="btn-frozen" class="tab-btn active" onclick="switchTab('frozen')">冷凍品</button>
        <button id="btn-chilled" class="tab-btn" onclick="switchTab('chilled')">冷藏常溫</button>
        <button id="btn-beef" class="tab-btn" onclick="switchTab('beef')">冷藏牛</button>
        <button id="btn-warning" class="tab-btn" onclick="switchTab('warning')">⚠️ 效期預警</button>
        <button id="btn-export" class="tab-btn export-btn" onclick="exportToExcel()">📥 匯出</button>
    </div>
    <div id="warningFilters" class="warning-filters">
        <script>
            const sources = [
                { id: 'frozen', name: '冷凍品' },
                { id: 'chilled', name: '冷藏常溫' },
                { id: 'beef', name: '冷藏牛' },
                { id: 'all', name: '全部合併' }
            ];
            sources.forEach(s => {
                document.write(`<div class="warning-group"><span class="warning-label">${s.name}</span>`);
                [15, 30, 60, 90].forEach(d => {
                    document.write(`<button class="filter-btn" onclick="setWarningFilter('${s.id}', ${d})">${d}日</button>`);
                });
                document.write(`</div>`);
            });
        </script>
    </div>
    <input type="text" id="searchInput" class="search-box" placeholder="搜尋名稱或批號..." oninput="handleSearch()">
    <table>
        <thead><tr><th id="th-name" onclick="toggleFilterZero()">品項 [顯示全部]</th><th onclick="toggleSort('qty')">庫存 ↕</th><th onclick="toggleSort('batch')">批號 ↕</th><th onclick="toggleSort('date')">有效日期 ↕</th></tr></thead>
        <tbody id="inventoryBody"><tr><td colspan="4">讀取中...</td></tr></tbody>
    </table>
    <div class="pagination"><button class="page-btn" onclick="changePage(-1)">◀</button><span id="pageInfo">第 1 頁</span><button class="page-btn" onclick="changePage(1)">▶</button></div>
</div>

<script>
    const CONFIG = {
        frozen: { fileName: "https://raw.githubusercontent.com/mingfonglpg-bit/-/main/data/frozen.csv", idx_name: 0, idx_qty: 1, idx_batch: 2, idx_date: 3 },
        chilled: { fileName: "https://raw.githubusercontent.com/mingfonglpg-bit/-/main/data/chilled.csv", idx_name: 0, idx_qty: 1, idx_batch: 2, idx_date: 3 },
        beef: { fileName: "https://raw.githubusercontent.com/mingfonglpg-bit/-/main/data/beef.csv", idx_name: 2, idx_qty: 3, idx_batch: 0, idx_date: 1 }
    };
    let currentAllData = [], currentFilteredData = [], currentPage = 1, currentTab = 'frozen', warningFilter = { source: 'all', days: 30 }, sort = { key: null, dir: 'asc' };

    function processBeefExpiry(item) {
        if (!item.date || item.date === '-') return;
        let days = 0, name = item.name.toUpperCase();
        if (name.includes('GO')) days = 120; else if (name.includes('YK')) days = 123; else if (name.includes('SS')) days = 89; else if (name.includes('TY')) days = 140; else if (name.includes('KR')) days = 119;
        if (days > 0) {
            let p = item.date.split(/[-./]/);
            let d = new Date(parseInt(p[0]) < 100 ? 2000+parseInt(p[0]) : p[0], p[1]-1, p[2]);
            d.setDate(d.getDate() + days);
            item.date = d.toISOString().split('T')[0];
        }
    }

    function loadData() {
        if (currentTab === 'warning') {
            Promise.all(sources.map(s => s.id !== 'all' ? parse(s.id, s.name) : Promise.resolve([]))).then(res => {
                currentAllData = res.flat();
                applyWarningFilter();
            });
        } else {
            parse(currentTab).then(d => { currentAllData = d; render(); });
        }
    }

    function parse(key, name) {
        return new Promise(r => Papa.parse(CONFIG[key].fileName, { download: true, complete: res => {
            let d = res.data.slice(1).map(row => {
                let item = { name: row[CONFIG[key].idx_name], qty: parseFloat(row[CONFIG[key].idx_qty]), batch: row[CONFIG[key].idx_batch], date: String(row[CONFIG[key].idx_date] || '-') };
                if (key === 'beef') processBeefExpiry(item);
                return item;
            });
            r(d);
        }}));
    }

    function applyWarningFilter() {
        let today = new Date();
        currentFilteredData = currentAllData.filter(i => i.date !== '-' && (new Date(i.date) - today) / 86400000 <= warningFilter.days);
        render();
    }

    function toggleSort(key) {
        sort.dir = sort.key === key && sort.dir === 'asc' ? 'desc' : 'asc';
        sort.key = key;
        currentFilteredData.sort((a, b) => sort.dir === 'asc' ? (a[key] > b[key] ? 1 : -1) : (a[key] < b[key] ? 1 : -1));
        render();
    }

    function render() {
        const today = new Date();
        document.getElementById('inventoryBody').innerHTML = currentFilteredData.map(i => `<tr ${new Date(i.date) < today ? 'class="expired-row"' : ''}><td>${i.name}</td><td>${i.qty}</td><td>${i.batch}</td><td>${i.date}</td></tr>`).join('');
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+t));
        document.getElementById('warningFilters').style.display = t === 'warning' ? 'block' : 'none';
        document.getElementById('btn-export').style.display = t === 'warning' ? 'block' : 'none';
        loadData();
    }
    
    function setWarningFilter(s, d) { warningFilter = {source: s, days: d}; applyWarningFilter(); }
    function changePage(s) { currentPage = Math.max(1, currentPage + s); render(); }
    function handleSearch() { render(); }
    loadData();
</script>
</body>
</html>
