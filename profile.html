<!DOCTYPE html>
<html lang="zh-Hant" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個人中心 - 倉儲管理系統</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#005dac",
                        "on-primary": "#ffffff",
                        "primary-container": "#d4e3ff",
                        "on-primary-container": "#001c3a",
                        "surface": "#f8f9ff",
                        "on-surface": "#071e27",
                        "surface-container-low": "#f0f4fa",
                        "surface-container-high": "#e1eaf5",
                        "on-surface-variant": "#414752",
                        "outline-variant": "#c1c6d4"
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8f9ff;
            color: #071e27;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .avatar-gradient {
            background: linear-gradient(135deg, #005dac 0%, #1976d2 100%);
        }
    </style>
</head>
<body class="pb-32 font-sans">

    <header class="sticky top-0 z-50 glass-effect px-6 py-4 flex justify-between items-center transition-all">
        <div>
            <h1 class="text-xs font-bold tracking-widest text-primary uppercase font-display">System Profile</h1>
            <p class="text-xl font-extrabold font-display">個人帳戶設定</p>
        </div>
        <button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface active:scale-90 transition-transform">
            <span class="material-symbols-outlined text-xl">settings</span>
        </button>
    </header>

    <main class="mt-6">
        <section class="px-6 flex flex-col items-center">
            <div class="relative">
                <div class="w-24 h-24 rounded-[2rem] avatar-gradient flex items-center justify-center text-white shadow-xl shadow-primary/20">
                    <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">person</span>
                </div>
                <div class="absolute -bottom-1 -right-1 w-8 h-8 bg-tertiary-efficiency rounded-full border-4 border-surface flex items-center justify-center">
                    <div class="w-2 h-2 bg-white rounded-full animate-pulse"></div>
                </div>
            </div>
            <h2 class="mt-4 text-2xl font-black font-display tracking-tight text-on-surface">Warehouse Admin</h2>
            <p class="text-xs font-bold text-on-surface-variant/60 uppercase tracking-[0.2em] mt-1">Senior Logistics Operator</p>
        </section>

        <section class="px-6 mt-10 space-y-2">
            <h3 class="text-[10px] font-black text-on-surface-variant/40 uppercase tracking-widest ml-4 mb-4">帳戶與權限</h3>
            
            <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-surface-container-low">
                <button class="w-full px-6 py-5 flex items-center justify-between active:bg-surface-container-low transition-colors">
                    <div class="flex items-center gap-4">
                        <span class="material-symbols-outlined text-primary">badge</span>
                        <span class="font-bold text-sm">員工身份認證</span>
                    </div>
                    <span class="material-symbols-outlined text-on-surface-variant opacity-30 text-lg">chevron_right</span>
                </button>
                <div class="mx-6 h-[1px] bg-surface-container-low"></div>
                <button class="w-full px-6 py-5 flex items-center justify-between active:bg-surface-container-low transition-colors">
                    <div class="flex items-center gap-4">
                        <span class="material-symbols-outlined text-primary">security</span>
                        <span class="font-bold text-sm">安全與登入密碼</span>
                    </div>
                    <span class="material-symbols-outlined text-on-surface-variant opacity-30 text-lg">chevron_right</span>
                </button>
            </div>
        </section>

        <section class="px-6 mt-8 space-y-2">
            <h3 class="text-[10px] font-black text-on-surface-variant/40 uppercase tracking-widest ml-4 mb-4">系統偏好</h3>
            
            <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-surface-container-low">
                <button class="w-full px-6 py-5 flex items-center justify-between active:bg-surface-container-low transition-colors">
                    <div class="flex items-center gap-4">
                        <span class="material-symbols-outlined text-primary">notifications_active</span>
                        <span class="font-bold text-sm">通知與警示設定</span>
                    </div>
                    <div class="w-10 h-5 bg-primary rounded-full relative">
                        <div class="absolute right-1 top-1 w-3 h-3 bg-white rounded-full"></div>
                    </div>
                </button>
                <div class="mx-6 h-[1px] bg-surface-container-low"></div>
                <button class="w-full px-6 py-5 flex items-center justify-between active:bg-surface-container-low transition-colors">
                    <div class="flex items-center gap-4">
                        <span class="material-symbols-outlined text-primary">dark_mode</span>
                        <span class="font-bold text-sm">深色模式</span>
                    </div>
                    <div class="w-10 h-5 bg-surface-container-high rounded-full relative">
                        <div class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full shadow-sm"></div>
                    </div>
                </button>
            </div>
        </section>

        <section class="px-6 mt-10">
            <button class="w-full py-5 rounded-[2rem] border-2 border-error-industrial/10 text-error-industrial font-black font-display text-sm tracking-widest uppercase active:bg-error-industrial/5 transition-colors">
                Sign Out / 安全登出
            </button>
            <p class="text-center mt-6 text-[10px] font-bold text-on-surface-variant/30 tracking-widest uppercase">
                Version 17.9.5 Build Alpha
            </p>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-white/80 backdrop-blur-xl shadow-[0_-12px_32px_rgba(7,30,39,0.08)] rounded-t-3xl border-t border-surface-container-low">
        
        <a href="code.html" class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors duration-200 px-3">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-[10px] font-medium mt-0.5">儀表板</span>
        </a>

        <a href="inventory.html" class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors duration-200 px-3">
            <span class="material-symbols-outlined">inventory_2</span>
            <span class="text-[10px] font-medium mt-0.5">庫存</span>
        </a>

        <a href="inbound.html" class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors duration-200 px-3">
            <span class="material-symbols-outlined">input</span>
            <span class="text-[10px] font-medium mt-0.5">入庫</span>
        </a>

        <a href="outbound.html" class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors duration-200 px-3">
            <span class="material-symbols-outlined">output</span>
            <span class="text-[10px] font-medium mt-0.5">出庫</span>
        </a>

        <a href="profile.html" class="flex flex-col items-center justify-center bg-primary-container text-primary rounded-2xl px-5 py-1.5 transition-all duration-300">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
            <span class="text-[10px] font-bold mt-0.5">個人</span>
        </a>

    </nav>

</body>
</html>
