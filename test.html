<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 倉儲庫位控管系統 V18.7 - 最終還原版</title>
    <style>
        /* --- 核心配色：嚴格還原原檔 --- */
        :root { 
            --primary: #6366f1; --warning: #f59e0b; --danger: #ef4444; --edit: #10b981;
            --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc; --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.1);
            --select-bg: #1e293b; --select-text: #c7d2fe;
            --color-polar-l: #38bdf8; --color-polar-r: #818cf8;
            --color-cool-l:  #fbbf24; --color-cool-r:  #fb7185;
            --color-normal:  #34d399; --color-cut:     #a855f7; 
        }
        * { box-sizing: border-box; }
        body { font-family: "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 10px; }
        .container { width: 100%; max-width: 1200px; margin: auto; display: none; }
        
        /* 視覺網格與變色定義 */
        .slot { aspect-ratio: 1; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; font-weight: bold; }
        .slot.occupied { color: white; }
        .slot.status-cut { background: var(--color-cut) !important; }
        .slot.status-danger { background: var(--danger) !important; }
        .slot.status-warning { background: var(--warning) !important; color: #000; }

        /* 表格與手機排版 */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        .report-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 5px; background: rgba(245,158,11,0.2); color: var(--warning); border: 1px solid var(--warning); }

        @media (max-width: 768px) {
            thead { display: none; }
            tr { display: block; background: rgba(255,255,255,0.02); margin-bottom: 15px; border-radius: 12px; padding: 10px; border: 1px solid var(--border); }
            td { display: flex; justify-content: space-between; align-items: center; border: none; padding: 8px 5px; text-align: right; }
            td::before { content: attr(data-label); color: var(--text-dim); font-size: 12px; }
            .header-row { flex-direction: column; gap: 15px; }
        }

        .btn-main { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; text-decoration: none; }
        #loader { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center; color:white; }
    </style>
</head>
<body>

<div id="loader">⚙️ 資料同步中...</div>

<div id="welcome-page" style="height:90vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1>📦 庫位控管系統 V18.7</h1>
    <button class="btn-main" style="background:var(--primary); padding:15px 50px; font-size: 1.1rem;" onclick="enterSystem()">進入主頁面</button>
</div>

<div class="container" id="main-container">
    <header class="header-row" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0;">主控制台</h2>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap: wrap;">
            <a href="count.html" class="btn-main" style="background:#0ea5e9;">🔍 查詢庫存量</a>
            <span id="usageInfo" style="background:rgba(99,102,241,0.2); padding:5px 10px; border-radius:6px; font-size:13px; font-weight:bold;">使用率: --%</span>
            <button onclick="fetchData()" class="btn-main" style="background:#475569;">刷新</button>
            <button id="adminBtn" onclick="toggleAdmin()" class="btn-main" style="background:var(--warning); color:#000;">🛠️ 管理員</button>
        </div>
    </header>

    <div id="admin-panel" style="display:none; background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; border:1px solid var(--primary); margin-bottom:20px;">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap:8px;">
            <select id="addZone" class="btn-main" style="background:#1e293b; color:#fff;"><option value="極冷庫-左">極冷庫-左</option><option value="極冷庫-右">極冷庫-右</option><option value="冷藏庫-左">冷藏庫-左</option><option value="冷藏庫-右">冷藏庫-右</option><option value="常溫區">常溫區</option></select>
            <select id="addFloor" class="btn-main" style="background:#1e293b; color:#fff;"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
            <input type="number" id="addPos" placeholder="儲位" style="padding:8px; background:#0f172a; color:#fff; border:1px solid var(--border);">
            <input type="text" id="addName" placeholder="產品名" style="padding:8px; background:#0f172a; color:#fff; border:1px solid var(--border);">
            <button onclick="commitAdd()" class="btn-main" style="background:var(--primary); justify-content:center;">確認入庫</button>
        </div>
    </div>

    <div style="background:rgba(255,255,255,0.02); padding:15px; border-radius:15px; border:1px solid var(--border);">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <b id="mapTitle">儲位分布圖</b>
            <div>
                <select id="vZone" onchange="renderVisual()"><option value="極冷庫-左">極冷庫-左</option><option value="極冷庫-右">極冷庫-右</option><option value="冷藏庫-左">冷藏庫-左</option><option value="冷藏庫-右">冷藏庫-右</option><option value="常溫區">常溫區</option></select>
                <select id="vFloor" onchange="renderVisual()"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
            </div>
        </div>
        <div id="visualGrid" style="display:grid; grid-template-columns: repeat(11, 1fr); gap:6px;"></div>
    </div>

    <input type="text" id="searchInput" placeholder="🔍 搜尋產品、儲位、批號..." oninput="renderTable()" style="width:100%; padding:15px; margin:20px 0; border-radius:10px; background:#1e293b; color:#fff; border:1px solid var(--border);">

    <table>
        <thead><tr><th>位置</th><th>產品內容</th><th>有效日期</th><th>操作</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="reportModal" class="modal">
    <div class="modal-content">
        <h3>🚩 狀態回報</h3>
        <select id="reportType" style="width:100%; padding:12px; margin-bottom:15px; background:#0f172a; color:#fff;"><option value="正常">正常</option><option value="異常">異常</option><option value="報廢">報廢</option><option value="移位">移位</option></select>
        <button onclick="submitReport()" class="btn-main" style="width:100%; background:var(--primary); justify-content:center;">確認提交</button>
        <button onclick="closeModal('reportModal')" style="width:100%; background:none; border:none; color:var(--text-dim); margin-top:10px; cursor:pointer;">取消</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGRptsGHH3MLrl4eU0UsCQ4lvxGE5goP3VF_FntVevNrG31h8VtXhjoYSpO56IYA_T/exec"; 
    const _KEY = "YWRtaW4xMjM="; 
    let inventory = [], zoneConfigs = {}, isAdmin = false, currentId = null;

    function getZoneColor(zone) {
        const colors = { "極冷庫-左": "#38bdf8", "極冷庫-右": "#818cf8", "冷藏庫-左": "#fbbf24", "冷藏庫-右": "#fb7185", "常溫區": "#34d399" };
        return colors[zone] || "#6366f1";
    }

    function enterSystem() { document.getElementById('welcome-page').style.display='none'; document.getElementById('main-container').style.display='block'; fetchData(); }

    async function fetchData() {
        document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch(SCRIPT_URL + "?t=" + new Date().getTime());
            const data = await res.json();
            inventory = data.inventory;
            zoneConfigs = data.configs;
            renderAll();
        } catch (e) { alert("讀取失敗"); }
        document.getElementById('loader').style.display = 'none';
    }

    function renderAll() { renderVisual(); renderTable(); }

    function renderVisual() {
        const grid = document.getElementById('visualGrid');
        const zone = document.getElementById('vZone').value;
        const floor = document.getElementById('vFloor').value;
        const config = zoneConfigs[zone] || { maxPos: 22, cols: 11 };
        
        grid.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
        grid.innerHTML = '';

        for (let i = 1; i <= config.maxPos; i++) {
            const items = inventory.filter(d => d.zone === zone && d.floor === floor && d.pos == i);
            const slot = document.createElement('div');
            slot.className = 'slot';
            
            if (items.length > 0) {
                const item = items[0];
                const note = item.note || "";
                slot.classList.add('occupied');
                
                // --- 狀態變色關鍵邏輯 ---
                if (item.name.includes("(切)")) slot.classList.add('status-cut');
                else if (note.includes("報廢")) slot.classList.add('status-danger');
                else if (note.includes("異常") || note.includes("移位")) slot.classList.add('status-warning');
                else slot.style.background = getZoneColor(zone);
            }
            slot.innerHTML = i;
            slot.onclick = () => { document.getElementById('searchInput').value = `${zone}${floor}-${i}`; renderTable(); };
            grid.appendChild(slot);
        }

        const zoneItems = inventory.filter(i => i.zone === zone);
        const occupiedCount = new Set(zoneItems.map(i => `${i.floor}-${i.pos}`)).size;
        document.getElementById('usageInfo').innerText = `使用率: ${((occupiedCount/(config.maxPos*4))*100).toFixed(1)}%`;
    }

    function renderTable() {
        const kw = document.getElementById('searchInput').value.toLowerCase();
        const filtered = inventory.filter(i => `${i.zone}${i.floor}-${i.pos} ${i.name} ${i.batch} ${i.note}`.toLowerCase().includes(kw));
        
        document.getElementById('tableBody').innerHTML = filtered.map(i => `
            <tr>
                <td data-label="位置"><b style="color:${getZoneColor(i.zone)}">${i.floor}-${i.pos}</b></td>
                <td data-label="產品內容"><b>${i.name}</b>${i.note ? `<span class="report-badge">${i.note}</span>` : ''}</td>
                <td data-label="有效日期">${i.date ? i.date.split('T')[0] : '-'}</td>
                <td data-label="操作">
                    <button onclick="openReport('${i.id}')" class="btn-main" style="background:#475569; padding:4px 10px;">回報</button>
                    ${isAdmin ? `<button onclick="deleteItem('${i.id}')" class="btn-main" style="background:var(--danger); padding:4px 10px; margin-left:5px;">刪除</button>` : ''}
                </td>
            </tr>
        `).join('');
    }

    function toggleAdmin() {
        if(!isAdmin) {
            const p = prompt("金鑰:");
            if(p && btoa(p) === _KEY) {
                isAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('adminBtn').innerText = "🔐 管理模式";
            }
        } else {
            isAdmin = false;
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('adminBtn').innerText = "🛠️ 管理員";
        }
        renderTable();
    }

    async function submitReport() {
        document.getElementById('loader').style.display = 'flex';
        await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({action:'report', id:currentId, type:document.getElementById('reportType').value}) });
        closeModal('reportModal'); fetchData();
    }

    async function commitAdd() {
        document.getElementById('loader').style.display = 'flex';
        const data = { action: "add", zone: document.getElementById('addZone').value, floor: document.getElementById('addFloor').value, pos: document.getElementById('addPos').value, name: document.getElementById('addName').value };
        await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify(data) });
        fetchData();
    }

    async function deleteItem(id) {
        if(!confirm("確定刪除？")) return;
        document.getElementById('loader').style.display = 'flex';
        await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({action:'delete', id:id}) });
        fetchData();
    }

    function openReport(id) { currentId = id; document.getElementById('reportModal').style.display = 'flex'; }
    function closeModal(m) { document.getElementById(m).style.display = 'none'; }
</script>
</body>
</html>
