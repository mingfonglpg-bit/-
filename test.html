<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 倉儲庫位控管系統 V18.3 - 重製版</title>
    <style>
        :root { 
            --primary: #6366f1; --warning: #f59e0b; --danger: #ef4444; --edit: #10b981;
            --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc; --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.1);
            --select-bg: #1e293b; --select-text: #c7d2fe;
            --color-polar-l: #38bdf8; --color-polar-r: #818cf8;
            --color-cool-l:  #fbbf24; --color-cool-r:  #fb7185;
            --color-normal:  #34d399; --color-cut:     #a855f7; 
        }
        * { box-sizing: border-box; }
        body { font-family: "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 10px; }
        .container { width: 100%; max-width: 1400px; margin: auto; display: none; }
        
        /* 儲位格樣式 */
        .slot { aspect-ratio: 1; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; font-weight: bold; }
        .slot.occupied { color: #fff; }
        .slot.status-cut { background: var(--color-cut) !important; }
        .slot.status-danger { background: var(--danger) !important; }
        .slot.status-warning { background: var(--warning) !important; color: #000 !important; }

        /* 使用率區塊上色 */
        .usage-badge { background: rgba(99, 102, 241, 0.2); color: #818cf8; padding: 8px 16px; border-radius: 12px; font-weight: bold; border: 1px solid var(--primary); }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        .report-label { display: inline-block; padding: 2px 8px; font-size: 12px; background: rgba(245, 158, 11, 0.2); color: var(--warning); border-radius: 4px; margin-top: 5px; }

        /* 分頁置中修正 */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 30px 0; width: 100%; }
        
        /* 彈窗樣式 */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:11000; justify-content:center; align-items: flex-start; padding-top: 50px; }
        .modal-content { background:var(--select-bg); padding:25px; border-radius:24px; width:90%; max-width:450px; border: 1px solid var(--primary); }
        
        .btn-main { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; color: white; background: var(--primary); text-decoration: none; }
        input.input-field { width: 100%; padding: 12px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid var(--border); margin-bottom: 10px; }
        
        #loader { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:12000; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div id="loader"><h2 style="color:white;">⚙️ 處理中...</h2></div>

<div id="welcome-page" style="height:90vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1>📦 倉儲庫位控管系統 V18.3</h1>
    <button class="btn-main" style="padding:15px 50px;" onclick="enterSystem()">進入系統</button>
</div>

<div class="container" id="main-container">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap: wrap; gap:10px;">
        <h2 style="margin:0;">主控制台</h2>
        <div style="display:flex; gap:10px; align-items:center;">
            <a href="count.html" class="btn-main" style="background:#0ea5e9;">🔍 查詢庫存量</a>
            <div id="usageInfo" class="usage-badge">使用率: --%</div>
            <button onclick="fetchData()" class="btn-main" style="background:#475569;">刷新</button>
            <button id="adminBtn" onclick="toggleAdmin()" class="btn-main" style="background:var(--warning); color:#000;">🛠️ 管理員</button>
        </div>
    </header>

    <div id="admin-panel" style="display:none; background:rgba(99,102,241,0.05); padding:20px; border-radius:15px; border:1px solid var(--primary); margin-bottom:20px;">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap:10px;">
            <select id="addZone" class="btn-main"><option value="極冷庫-左">極冷庫-左</option><option value="極冷庫-右">極冷庫-右</option><option value="冷藏庫-左">冷藏庫-左</option><option value="冷藏庫-右">冷藏庫-右</option><option value="常溫區">常溫區</option></select>
            <select id="addFloor" class="btn-main"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
            <input type="number" id="addPos" class="input-field" style="margin-bottom:0" placeholder="儲位">
            <input type="text" id="addName" class="input-field" style="margin-bottom:0" placeholder="產品名">
            <input type="text" id="addBatch" class="input-field" style="margin-bottom:0" placeholder="批號">
            <input type="date" id="addDate" class="input-field" style="margin-bottom:0">
            <button onclick="commitAdd()" class="btn-main" style="background:var(--edit); justify-content:center;">➕ 入庫</button>
        </div>
    </div>

    <div style="background:rgba(255,255,255,0.02); padding:20px; border-radius:15px; border:1px solid var(--border);">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <b id="mapTitle">儲位分布圖</b>
            <div>
                <select id="vZone" onchange="renderVisual()"><option value="極冷庫-左">極冷庫-左</option><option value="極冷庫-右">極冷庫-右</option><option value="冷藏庫-左">冷藏庫-左</option><option value="冷藏庫-右">冷藏庫-右</option><option value="常溫區">常溫區</option></select>
                <select id="vFloor" onchange="renderVisual()"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
            </div>
        </div>
        <div id="visualGrid" style="display:grid; grid-template-columns: repeat(11, 1fr); gap:8px;"></div>
    </div>

    <input type="text" id="searchInput" placeholder="🔍 搜尋產品、批號、儲位 (點圖自動精確搜尋)..." oninput="handleSearch(false)" style="width:100%; padding:15px; margin:20px 0; border-radius:10px; background:#1e293b; color:#fff; border:1px solid var(--border);">

    <table>
        <thead><tr><th>儲位</th><th>產品</th><th>批號</th><th>效期</th><th>功能</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="pagination" id="paginationCtrl"></div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--edit);">📝 編輯儲位資料</h3>
        <input type="hidden" id="editId">
        <input type="text" id="editName" class="input-field" placeholder="產品名稱">
        <input type="text" id="editBatch" class="input-field" placeholder="批號">
        <input type="date" id="editDate" class="input-field">
        <input type="text" id="editNote" class="input-field" placeholder="備註 (填 報廢/異常 會變色)">
        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="background:#475569; flex:1;" onclick="closeModal('editModal')">取消</button>
            <button class="btn-main" style="background:var(--edit); flex:1;" onclick="submitEdit()">儲存</button>
        </div>
    </div>
</div>

<div id="reportModal" class="modal">
    <div class="modal-content">
        <h3>🚩 狀態回報</h3>
        <select id="reportType" class="input-field"><option value="正常">正常</option><option value="異常">異常</option><option value="報廢">報廢</option><option value="移位">移位</option></select>
        <textarea id="reportReason" class="input-field" placeholder="請打字說明..." style="height:80px;"></textarea>
        <button onclick="submitReport()" class="btn-main" style="width:100%; justify-content:center;">提交回報</button>
        <button onclick="closeModal('reportModal')" style="width:100%; background:none; border:none; color:var(--text-dim); margin-top:10px;">取消</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGRptsGHH3MLrl4eU0UsCQ4lvxGE5goP3VF_FntVevNrG31h8VtXhjoYSpO56IYA_T/exec"; 
    const _KEY = "YWRtaW4xMjM="; // admin123
    let inventory = [], zoneConfigs = {}, isAdmin = false, currentId = null;
    let currentPage = 1, rowsPerPage = 10;

    function getZoneColor(zone) {
        const colors = { "極冷庫-左": "#38bdf8", "極冷庫-右": "#818cf8", "冷藏庫-左": "#fbbf24", "冷藏庫-右": "#fb7185", "常溫區": "#34d399" };
        return colors[zone] || "#6366f1";
    }

    function enterSystem() { document.getElementById('welcome-page').style.display='none'; document.getElementById('main-container').style.display='block'; fetchData(); }

    async function fetchData() {
        document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch(SCRIPT_URL + "?t=" + new Date().getTime());
            const data = await res.json();
            inventory = data.inventory;
            zoneConfigs = data.configs;
            renderAll();
        } catch (e) { alert("讀取失敗"); }
        document.getElementById('loader').style.display = 'none';
    }

    function renderAll() { renderVisual(); handleSearch(false); }

    function renderVisual() {
        const grid = document.getElementById('visualGrid');
        const zone = document.getElementById('vZone').value;
        const floor = document.getElementById('vFloor').value;
        const config = zoneConfigs[zone] || { maxPos: 22, cols: 11 };
        grid.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
        grid.innerHTML = '';

        for (let i = 1; i <= config.maxPos; i++) {
            const items = inventory.filter(d => d.zone === zone && d.floor === floor && d.pos == i);
            const slot = document.createElement('div');
            slot.className = 'slot';
            if (items.length > 0) {
                const item = items[0];
                const note = item.note || "";
                slot.classList.add('occupied');
                if (item.name.includes("(切)")) slot.classList.add('status-cut');
                else if (note.includes("報廢")) slot.classList.add('status-danger');
                else if (note.includes("異常") || note.includes("移位")) slot.classList.add('status-warning');
                else slot.style.background = getZoneColor(zone);
            }
            slot.innerHTML = i;
            slot.onclick = () => { 
                document.getElementById('searchInput').value = `${zone}${floor}-${i}`; 
                handleSearch(true); 
            };
            grid.appendChild(slot);
        }
        const zoneItems = inventory.filter(i => i.zone === zone);
        const occupiedCount = new Set(zoneItems.map(i => `${i.floor}-${i.pos}`)).size;
        document.getElementById('usageInfo').innerText = `使用率: ${((occupiedCount/(config.maxPos*4))*100).toFixed(1)}%`;
    }

    function handleSearch(isExact) {
        const kw = document.getElementById('searchInput').value.trim().toLowerCase();
        const filtered = inventory.filter(i => {
            const fullLoc = `${i.zone}${i.floor}-${i.pos}`.toLowerCase();
            const shortLoc = `${i.floor}-${i.pos}`.toLowerCase();
            if (isExact) return fullLoc === kw;
            return (fullLoc + i.name + i.batch + i.note).toLowerCase().includes(kw);
        });

        const totalPages = Math.ceil(filtered.length / rowsPerPage) || 1;
        const start = (currentPage - 1) * rowsPerPage;
        const pagedData = filtered.slice(start, start + rowsPerPage);

        document.getElementById('tableBody').innerHTML = pagedData.map(i => `
            <tr>
                <td><b style="color:${getZoneColor(i.zone)}">${i.floor}-${i.pos}</b></td>
                <td><b>${i.name}</b>${i.note ? `<br><span class="report-label">${i.note}</span>` : ''}</td>
                <td>${i.batch || '-'}</td>
                <td>${i.date ? i.date.split('T')[0] : '-'}</td>
                <td>
                    <button onclick="openReport('${i.id}')" class="btn-main" style="padding:4px 8px; background:#475569;">回報</button>
                    ${isAdmin ? `
                        <button onclick="openEdit('${i.id}')" class="btn-main" style="padding:4px 8px; background:var(--edit);">編輯</button>
                        <button onclick="deleteItem('${i.id}')" class="btn-main" style="padding:4px 8px; background:var(--danger);">刪除</button>
                    ` : ''}
                </td>
            </tr>
        `).join('');

        renderPagination(totalPages);
    }

    function renderPagination(total) {
        const ctrl = document.getElementById('paginationCtrl');
        ctrl.innerHTML = `
            <button class="btn-main" style="background:#334155" onclick="changePage(1)" ${currentPage===1?'disabled':''}>首頁</button>
            <span style="font-weight:bold">${currentPage} / ${total}</span>
            <button class="btn-main" style="background:#334155" onclick="changePage(${currentPage+1})" ${currentPage===total?'disabled':''}>下一頁</button>
        `;
    }

    function changePage(p) { currentPage = p; handleSearch(false); }

    function toggleAdmin() {
        if(!isAdmin) {
            const p = prompt("金鑰:");
            if(p && btoa(p) === _KEY) {
                isAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('adminBtn').innerText = "🔐 管理模式";
            } else { alert("錯誤"); }
        } else {
            isAdmin = false;
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('adminBtn').innerText = "🛠️ 管理員";
        }
        handleSearch(false);
    }

    // 功能函數
    function openEdit(id) {
        const i = inventory.find(x => x.id == id);
        currentId = id;
        document.getElementById('editId').value = id;
        document.getElementById('editName').value = i.name;
        document.getElementById('editBatch').value = i.batch || '';
        document.getElementById('editDate').value = i.date ? i.date.split('T')[0] : '';
        document.getElementById('editNote').value = i.note || '';
        document.getElementById('editModal').style.display = 'flex';
    }

    async function submitEdit() {
        document.getElementById('loader').style.display = 'flex';
        await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({action:'edit', id:document.getElementById('editId').value, name:document.getElementById('editName').value, batch:document.getElementById('editBatch').value, date:document.getElementById('editDate').value, note:document.getElementById('editNote').value}) });
        closeModal('editModal'); fetchData();
    }

    async function submitReport() {
        document.getElementById('loader').style.display = 'flex';
        await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({action:'report', id:currentId, type:document.getElementById('reportType').value, reason:document.getElementById('reportReason').value}) });
        closeModal('reportModal'); fetchData();
    }

    async function commitAdd() {
        document.getElementById('loader').style.display = 'flex';
        await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({action:"add", zone:document.getElementById('addZone').value, floor:document.getElementById('addFloor').value, pos:document.getElementById('addPos').value, name:document.getElementById('addName').value, batch:document.getElementById('addBatch').value, date:document.getElementById('addDate').value}) });
        fetchData();
    }

    async function deleteItem(id) {
        if(!confirm("刪除此筆資料？")) return;
        document.getElementById('loader').style.display = 'flex';
        await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({action:'delete', id:id}) });
        fetchData();
    }

    function openReport(id) { currentId = id; document.getElementById('reportModal').style.display = 'flex'; }
    function closeModal(m) { document.getElementById(m).style.display = 'none'; }
</script>
</body>
</html>
