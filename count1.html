<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>庫存查詢系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b;
            --primary: #38bdf8; --accent: #10b981; 
            --text-main: #f1f5f9; --text-dim: #94a3b8;
            --bright-qty: #ccff00; --alert: #ff4444; 
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 0; }
        .marquee-container { background: #334155; color: var(--bright-qty); padding: 8px 0; font-weight: bold; font-size: 14px; border-bottom: 1px solid var(--primary); }
        .container { max-width: 900px; margin: 15px auto; background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 1.2rem; color: var(--primary); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 120px; padding: 12px; border: none; border-radius: 12px; background: #334155; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; text-align: center; }
        .tab-btn.active { background: var(--primary); color: #0f172a; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        
        .export-btn { background: var(--accent); color: #0f172a; display: none; }
        
        .search-box { width: 100%; padding: 12px 16px; background: #334155; border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 16px; margin-bottom: 15px; outline: none; }

        /* 效期預警子篩選區 */
        .warning-filters { display: none; margin-bottom: 15px; padding: 12px; background: #0f172a; border-radius: 12px; border: 1px solid var(--border); }
        .warning-group { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 8px; }
        .warning-group:last-child { margin-bottom: 0; }
        .warning-label { color: var(--text-dim); font-size: 12px; min-width: 95px; }
        .filter-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; background: #334155; color: white; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .filter-btn:hover { background: #475569; }
        .filter-btn.active { background: var(--accent); color: #0f172a; font-weight: bold; box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }

        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; padding: 12px 8px; border-bottom: 2px solid var(--border); color: var(--text-dim); font-size: 13px; }
        
        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { color: var(--primary); }
        th .col-hint { font-size: 11px; color: var(--text-dim); font-weight: normal; margin-left: 4px; }
        th.active-filter .col-hint { color: var(--accent); }
        
        td { padding: 14px 8px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .qty-tag { background: rgba(204, 255, 0, 0.1); color: var(--bright-qty); padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        .low-stock { color: var(--alert); background: rgba(255, 68, 68, 0.1); }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; }
        .page-btn { background: #475569; border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .loading-msg { text-align: center; padding: 50px; color: var(--text-dim); }

        .qty-zero-row { text-decoration: line-through; opacity: 0.6; }
        .expired-row { text-decoration: line-through; color: var(--alert) !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="marquee-container">
    <marquee scrollamount="5">🚀 庫存資料已於 2026.07.14 更新。</marquee>
</div>

<div class="container">
    <div class="header">
        <h2>❄️ 庫存查詢系統</h2>
        <div id="updateTime" style="font-size: 12px; color: var(--text-dim);">最後更新: 26.07.16</div>
    </div>

    <div class="tabs">
        <button id="btn-frozen" class="tab-btn active" onclick="switchTab('frozen')">冷凍品</button>
        <button id="btn-chilled" class="tab-btn" onclick="switchTab('chilled')">冷藏品/常溫品</button>
        <button id="btn-beef" class="tab-btn" onclick="switchTab('beef')">冷藏牛</button>
        <button id="btn-warning" class="tab-btn" onclick="switchTab('warning')">⚠️ 效期預警</button>
        <button id="btn-export" class="tab-btn export-btn" onclick="exportToExcel()">📥 匯出預警檔</button>
    </div>

    <div id="warningFilters" class="warning-filters">
        <div class="warning-group">
            <span class="warning-label">冷凍品：</span>
            <button class="filter-btn" data-source="frozen" data-days="15" onclick="setWarningFilter('frozen', 15)">15日預警</button>
            <button class="filter-btn" data-source="frozen" data-days="30" onclick="setWarningFilter('frozen', 30)">30日預警</button>
            <button class="filter-btn" data-source="frozen" data-days="60" onclick="setWarningFilter('frozen', 60)">60日預警</button>
        </div>
        <div class="warning-group">
            <span class="warning-label">冷藏常溫品：</span>
            <button class="filter-btn" data-source="chilled" data-days="15" onclick="setWarningFilter('chilled', 15)">15日預警</button>
            <button class="filter-btn" data-source="chilled" data-days="30" onclick="setWarningFilter('chilled', 30)">30日預警</button>
            <button class="filter-btn" data-source="chilled" data-days="60" onclick="setWarningFilter('chilled', 60)">60日預警</button>
        </div>
        <div class="warning-group">
            <span class="warning-label">冷藏牛：</span>
            <button class="filter-btn" data-source="beef" data-days="15" onclick="setWarningFilter('beef', 15)">15日預警</button>
            <button class="filter-btn" data-source="beef" data-days="30" onclick="setWarningFilter('beef', 30)">30日預警</button>
            <button class="filter-btn" data-source="beef" data-days="60" onclick="setWarningFilter('beef', 60)">60日預警</button>
        </div>
        <div class="warning-group">
            <span class="warning-label">全部合併：</span>
            <button class="filter-btn" data-source="all" data-days="15" onclick="setWarningFilter('all', 15)">15日預警</button>
            <button class="filter-btn active" data-source="all" data-days="30" onclick="setWarningFilter('all', 30)">30日預警</button>
            <button class="filter-btn" data-source="all" data-days="60" onclick="setWarningFilter('all', 60)">60日預警</button>
        </div>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="搜尋名稱或批號..." oninput="handleSearch()">

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th width="40%" class="sortable" id="th-name" onclick="toggleFilterZero()">品項 <span id="filter-zero-icon" class="col-hint">[顯示全部]</span></th>
                    <th width="15%" class="sortable" onclick="toggleSort('qty')">庫存 <span id="sort-qty">↕</span></th>
                    <th width="25%" class="sortable" onclick="toggleSort('batch')">批號 <span id="sort-batch">↕</span></th>
                    <th width="20%" class="sortable" onclick="toggleSort('date')">有效日期 <span id="sort-date">↕</span></th>
                </tr>
            </thead>
            <tbody id="inventoryBody">
                <tr><td colspan="4" class="loading-msg">讀取中...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination">
        <button class="page-btn" id="prevBtn" onclick="changePage(-1)">◀ 上一頁</button>
        <span id="pageInfo">第 1 / 1 頁</span>
        <button class="page-btn" id="nextBtn" onclick="changePage(1)">下一頁 ▶</button>
    </div>
</div>

<script>
    /* ============================================================
       🔧 欄位索引設定區 (CSV 欄位代號參考)
       ============================================================ */
    const CONFIG = {
        frozen: {
            fileName: "https://mingfonglpg-bit.github.io/-/frozen.csv",
            idx_name: 0,   // [A 欄] 品名
            idx_qty: 1,   // [B 欄] 數量
            idx_batch: 2, // [C 欄] 批號
            idx_date: 3,  // [D 欄] 有效日期
        },
        chilled: {
            fileName: "chilled.csv",
            idx_name: 0,   // [A 欄] 品名
            idx_qty: 1,   // [B 欄] 數量
            idx_batch: 2, // [C 欄] 批號
            idx_date: 3,  // [D 欄] 有效日期
        },
        beef: {
            fileName: "beef.csv",
            idx_name: 2,   // [C 欄] 品名
            idx_qty: 3,    // [D 欄] 庫存
            idx_batch: 0,  // [A 欄] 批號
            idx_date: 1,   // [B 欄] 預設日欄位 (若為空，系統會自動全欄位掃描容錯)
        }
    };

    /* ============================================================
       🥩 冷藏牛特殊規格效期動態計算處理
       ============================================================ */
    function processBeefExpiry(item) {
        if (!item.date || item.date === '-') {
            item.date = '-';
            return;
        }
        
      // 依照需求，這裡「僅」擷取品項名稱進行大寫轉換與比對
        const nameText = (item.name || '').toUpperCase();

        let daysToAdd = 0;
        
        // 對應品項名查詢，賦予指定的有效天數
        if (nameText.includes('GO')) daysToAdd = 120;
        else if (nameText.includes('YK')) daysToAdd = 123;
        else if (nameText.includes('SS')) daysToAdd = 89;
        else if (nameText.includes('TY')) daysToAdd = 140;
        else if (nameText.includes('KR')) daysToAdd = 119;
        
        // 如果符合代碼，則將 PACKING 日期加上指定天數轉換為有效日期
        if (daysToAdd > 0) {
            let cleanStr = item.date.trim();
            
            // 處理 "~" 範圍格式 (例如 2026.04.14~2026.04.21)，取第一個日期計算最保險
            if (cleanStr.includes('~')) {
                cleanStr = cleanStr.split('~')[0].trim();
            }

            // 將 "." 和 "/" 統一替換為 "-"，處理 2026.06.6 或 2026/06/06 格式
            cleanStr = cleanStr.replace(/[\.\/]/g, '-');

            let packingDate = null;
            let y, m, d;
            
            // 處理不同的日期字串格式，使用在地時間拆解構造，防範時區偏移
            if (/^\d{8}$/.test(cleanStr)) {
                y = parseInt(cleanStr.substring(0, 4), 10);
                m = parseInt(cleanStr.substring(4, 6), 10) - 1;
                d = parseInt(cleanStr.substring(6, 8), 10);
                packingDate = new Date(y, m, d);
            } else if (/^\d{6}$/.test(cleanStr)) {
                y = parseInt('20' + cleanStr.substring(0, 2), 10);
                m = parseInt(cleanStr.substring(2, 4), 10) - 1;
                d = parseInt(cleanStr.substring(4, 6), 10);
                packingDate = new Date(y, m, d);
            } else {
                let parts = cleanStr.split('-');
                if (parts.length >= 3) {
                    y = parseInt(parts[0], 10);
                    m = parseInt(parts[1], 10) - 1;
                    d = parseInt(parts[2], 10);
                    packingDate = new Date(y, m, d);
                }
            }
            
            // 計算新日期並格式化回標準 YYYY-MM-DD
            if (packingDate && !isNaN(packingDate.getTime())) {
                packingDate.setDate(packingDate.getDate() + daysToAdd);
                const rY = packingDate.getFullYear();
                const rM = String(packingDate.getMonth() + 1).padStart(2, '0');
                const rD = String(packingDate.getDate()).padStart(2, '0');
                item.date = `${rY}-${rM}-${rD}`;
            } else {
                item.date = '-';
            }
        } else {
            // 無匹配指定代碼時，有效日期安全顯示 "-"
            item.date = '-';
        }
    }
    /* ============================================================ */

    let currentAllData = []; 
    let currentFilteredData = []; 
    let currentPage = 1;
    let currentTab = 'frozen';
    const ROWS_PER_PAGE = 12;

    // 排序狀態追蹤
    let sortConfig = { key: null, direction: 'asc' };

    // 品項點擊：是否隱藏 0 庫存
    let filterZeroState = false;

    // 效期預警子篩選狀態
    let warningRawData = { frozen: [], chilled: [], beef: [] };
    let warningFilter = { source: 'all', days: 30 };

    loadCSVData();

    // 封裝單一 CSV 讀取為 Promise
    function parseCSVPromise(settings, sourceName) {
        return new Promise((resolve) => {
            Papa.parse(settings.fileName, {
                download: true,
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    const mapped = results.data.slice(1).map(row => {
                        let name = row[settings.idx_name] || '';
                        let qty = parseFloat(row[settings.idx_qty]) || 0;
                        let batch = row[settings.idx_batch] || '-';
                        
                        // 尋找日期欄位（若冷藏牛預設欄位空或為 -，執行全欄位自動偵測掃描）
                        let rawDate = row[settings.idx_date] ? String(row[settings.idx_date]).trim() : '';
                        if (sourceName === '冷藏牛' && (!rawDate || rawDate === '-')) {
                            for (let i = 0; i < row.length; i++) {
                                if (i === settings.idx_name || i === settings.idx_batch || i === settings.idx_qty) continue;
                                let val = String(row[i]).trim();
                                if (/^\d{4}[-/]\d{1,2}[-/]\d{1,2}$/.test(val) || /^\d{8}$/.test(val) || /^\d{6}$/.test(val) || /[\.\~]/.test(val)) {
                                    rawDate = val;
                                    break;
                                }
                            }
                        }
                        if (!rawDate) rawDate = '-';

                        let item = {
                            name: name,
                            qty: qty,
                            batch: batch,
                            date: rawDate,
                            source: sourceName
                        };
                        
                        // 如果是冷藏牛，進行動態效期轉換
                        if (sourceName === '冷藏牛') {
                            processBeefExpiry(item);
                        }
                        return item;
                    }).filter(item => item.name !== '');
                    resolve(mapped);
                },
                error: function() {
                    resolve([]); // 讀取失敗回傳空陣列，避免中斷整體執行
                }
            });
        });
    }

    function loadCSVData() {
        // 重置排序標記
        sortConfig = { key: null, direction: 'asc' };
        updateSortIcons();

        if (currentTab === 'warning') {
            // 效期預警：同時讀取三份 CSV 並依子篩選條件過濾
            Promise.all([
                parseCSVPromise(CONFIG.frozen, '冷凍'),
                parseCSVPromise(CONFIG.chilled, '冷藏常溫'),
                parseCSVPromise(CONFIG.beef, '冷藏牛')
            ]).then(([frozenData, chilledData, beefData]) => {
                warningRawData = { frozen: frozenData, chilled: chilledData, beef: beefData };
                applyWarningFilter();
            });
        } else {
            // 一般頁籤讀取
            const settings = CONFIG[currentTab];
            Papa.parse(settings.fileName, {
                download: true,
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    currentAllData = results.data.slice(1).map(row => {
                        let name = row[settings.idx_name] || '';
                        let qty = parseFloat(row[settings.idx_qty]) || 0;
                        let batch = row[settings.idx_batch] || '-';
                        
                        // 尋找日期欄位（冷藏牛支援自動跨欄位偵測掃描）
                        let rawDate = row[settings.idx_date] ? String(row[settings.idx_date]).trim() : '';
                        if (currentTab === 'beef' && (!rawDate || rawDate === '-')) {
                            for (let i = 0; i < row.length; i++) {
                                if (i === settings.idx_name || i === settings.idx_batch || i === settings.idx_qty) continue;
                                let val = String(row[i]).trim();
                                if (/^\d{4}[-/]\d{1,2}[-/]\d{1,2}$/.test(val) || /^\d{8}$/.test(val) || /^\d{6}$/.test(val) || /[\.\~]/.test(val)) {
                                    rawDate = val;
                                    break;
                                }
                            }
                        }
                        if (!rawDate) rawDate = '-';

                        let item = {
                            name: name,
                            qty: qty,
                            batch: batch,
                            date: rawDate
                        };

                        // 如果是冷藏牛，進行動態效期轉換
                        if (currentTab === 'beef') {
                            processBeefExpiry(item);
                        }
                        return item;
                    }).filter(item => item.name !== '');

                    processSearchAndRender();
                },
                error: function() {
                    document.getElementById('inventoryBody').innerHTML = 
                        `<tr><td colspan="4" class="loading-msg" style="color:#ff4444;">❌ 讀取失敗，請檢查網路或確認 GitHub 上的檔案是否存在</td></tr>`;
                }
            });
        }
    }

    // 套用效期預警子篩選（依 warningFilter.source 與 warningFilter.days）
    function applyWarningFilter() {
        const today = new Date();
        const limit = warningFilter.days * 24 * 60 * 60 * 1000; // 毫秒數

        let pool = [];
        if (warningFilter.source === 'all') {
            pool = [...warningRawData.frozen, ...warningRawData.chilled, ...warningRawData.beef];
        } else {
            pool = warningRawData[warningFilter.source] || [];
        }

        currentAllData = pool.filter(item => {
            if (!item.date || item.date === '-') return false;
            const expiryDate = new Date(item.date);
            if (isNaN(expiryDate.getTime())) return false;
            const diff = expiryDate - today;
            return diff <= limit; // 包含指定天數內與已過期
        });

        processSearchAndRender();
    }

    // 切換效期預警子篩選按鈕
    function setWarningFilter(source, days) {
        warningFilter = { source, days };
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active',
                btn.dataset.source === source && parseInt(btn.dataset.days, 10) === days);
        });
        applyWarningFilter();
    }

    function processSearchAndRender() {
        const keyword = document.getElementById('searchInput').value.toLowerCase().replace(/\s+/g, '');
        
        let result = currentAllData.filter(item => {
            const combinedText = (item.name + item.batch).toLowerCase().replace(/\s+/g, '');
            return combinedText.includes(keyword);
        });

        if (filterZeroState) {
            result = result.filter(item => item.qty > 0);
        }

        if (sortConfig.key) {
            result.sort((a, b) => {
                let valA = a[sortConfig.key];
                let valB = b[sortConfig.key];
                
                if (sortConfig.key === 'date') {
                    if (valA === '-') return 1;
                    if (valB === '-') return -1;
                    const dA = new Date(valA).getTime() || 0;
                    const dB = new Date(valB).getTime() || 0;
                    return sortConfig.direction === 'asc' ? dA - dB : dB - dA;
                }

                if (sortConfig.key === 'qty') {
                    const nA = parseFloat(valA) || 0;
                    const nB = parseFloat(valB) || 0;
                    return sortConfig.direction === 'asc' ? nA - nB : nB - nA;
                }
                
                return sortConfig.direction === 'asc' 
                    ? valA.localeCompare(valB, undefined, {numeric: true}) 
                    : valB.localeCompare(valA, undefined, {numeric: true});
            });
        }

        currentFilteredData = result;
        currentPage = 1;
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('inventoryBody');
        const start = (currentPage - 1) * ROWS_PER_PAGE;
        const pageData = currentFilteredData.slice(start, start + ROWS_PER_PAGE);

        if (pageData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="loading-msg">🔍 沒有符合搜尋條件的資料</td></tr>`;
        } else {
            const today = new Date();

            tbody.innerHTML = pageData.map(item => {
                let rowClass = ''; 

                if (item.date && item.date !== '-') {
                    const expiryDate = new Date(item.date);
                    const diff = expiryDate - today;
                    
                    if (diff <= 0) {
                        rowClass = 'class="expired-row"';
                    }
                }

                if (item.qty === 0 && rowClass === '') {
                    rowClass = 'class="qty-zero-row"';
                }

                return `
                <tr ${rowClass}>
                    <td>${item.name} ${item.source ? `<small style="color:var(--primary)">(${item.source})</small>` : ''}</td>
                    <td><span class="qty-tag ${item.qty <= 5 ? 'low-stock' : ''}">${item.qty}</span></td>
                    <td style="font-family: monospace;">${item.batch}</td>
                    <td style="color: var(--text-dim);">${item.date}</td>
                </tr>
                `;
            }).join('');
        }
        updatePagination();
    }

    function toggleSort(key) {
        if (sortConfig.key === key) {
            sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
        } else {
            sortConfig.key = key;
            sortConfig.direction = 'asc';
        }
        updateSortIcons();
        processSearchAndRender();
    }

    function updateSortIcons() {
        const batchIcon = document.getElementById('sort-batch');
        const dateIcon = document.getElementById('sort-date');
        const qtyIcon = document.getElementById('sort-qty');

        if (batchIcon) batchIcon.innerText = (sortConfig.key === 'batch') ? (sortConfig.direction === 'asc' ? '▲' : '▼') : '↕';
        if (dateIcon)  dateIcon.innerText  = (sortConfig.key === 'date')  ? (sortConfig.direction === 'asc' ? '▲' : '▼') : '↕';
        if (qtyIcon)   qtyIcon.innerText   = (sortConfig.key === 'qty')   ? (sortConfig.direction === 'asc' ? '▲' : '▼') : '↕';
    }

    function toggleFilterZero() {
        filterZeroState = !filterZeroState;
        const icon = document.getElementById('filter-zero-icon');
        const th = document.getElementById('th-name');
        icon.innerText = filterZeroState ? '[隱藏0庫存]' : '[顯示全部]';
        th.classList.toggle('active-filter', filterZeroState);
        processSearchAndRender();
    }

    function exportToExcel() {
        if (currentTab !== 'warning') {
            alert('請先切換至「效期預警」頁籤再匯出');
            return;
        }
        if (currentFilteredData.length === 0) {
            alert('目前沒有可匯出的預警資料，請先選擇預警條件');
            return;
        }

        const sourceLabel = warningFilter.source === 'all' ? '全部'
            : (warningFilter.source === 'frozen'  ? '冷凍品'
              : warningFilter.source === 'chilled' ? '冷藏常溫品' : '冷藏牛');

        const data = currentFilteredData.map(item => ({
            '來源庫別': item.source || '',
            '品項': item.name,
            '庫存': item.qty,
            '批號': item.batch,
            '有效日期': item.date
        }));

        const ws = XLSX.utils.json_to_sheet(data);
        ws['!cols'] = [
            { wch: 12 },
            { wch: 40 },
            { wch: 8 }, 
            { wch: 18 },
            { wch: 14 } 
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '效期預警');

        const fileName = `效期預警_${sourceLabel}${warningFilter.days}日_${new Date().toISOString().slice(0,10)}.xlsx`;
        XLSX.writeFile(wb, fileName);
    }

    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const searchTerm = params.get('search');
        
        if (searchTerm) {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.value = decodeURIComponent(searchTerm);
                processSearchAndRender();
            }
        }
    });

    function updatePagination() {
        const totalPages = Math.ceil(currentFilteredData.length / ROWS_PER_PAGE) || 1;
        document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${totalPages} 頁`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === totalPages);
    }

    function handleSearch() {
        processSearchAndRender();
    }

    function changePage(step) {
        currentPage += step;
        renderTable();
    }

    function switchTab(tab) {
        if (currentTab === tab) return;
        currentTab = tab;
        
        document.getElementById('btn-frozen').classList.toggle('active', tab === 'frozen');
        document.getElementById('btn-chilled').classList.toggle('active', tab === 'chilled');
        document.getElementById('btn-beef').classList.toggle('active', tab === 'beef');
        document.getElementById('btn-warning').classList.toggle('active', tab === 'warning');
        
        document.getElementById('btn-export').style.display = (tab === 'warning') ? 'block' : 'none';
        document.getElementById('warningFilters').style.display = (tab === 'warning') ? 'block' : 'none';

        filterZeroState = false;
        const icon = document.getElementById('filter-zero-icon');
        const th = document.getElementById('th-name');
        if (icon) icon.innerText = '[顯示全部]';
        if (th) th.classList.remove('active-filter');

        document.getElementById('inventoryBody').innerHTML = `<tr><td colspan="4" class="loading-msg">切換中...</td></tr>`;
        loadCSVData();
    }
</script>

</body>
</html>
