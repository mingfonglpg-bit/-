<!DOCTYPE html>
<html lang="zh-Hant" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倉儲管理系統 - 儀表板</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#005dac",
                        "on-primary": "#ffffff",
                        "primary-container": "#d4e3ff",
                        "on-primary-container": "#001c3a",
                        "surface": "#f8f9ff",
                        "on-surface": "#071e27",
                        "surface-container-low": "#f0f4fa",
                        "surface-container-high": "#e1eaf5",
                        "secondary-industrial": "#964900",
                        "tertiary-efficiency": "#0d6c1e"
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8f9ff;
            color: #071e27;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-50 glass-effect px-6 py-4 flex justify-between items-center transition-all duration-300">
        <div>
            <h1 class="text-xs font-bold tracking-widest text-primary uppercase font-display">Warehouse System</h1>
            <p class="text-xl font-extrabold font-display">儀表板總覽</p>
        </div>
        <button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface transition-transform active:scale-90">
            <span class="material-symbols-outlined">qr_code_scanner</span>
        </button>
    </header>

    <main class="px-6 mt-6 space-y-8">
        
        <section class="grid grid-cols-2 gap-4">
            <div class="bg-primary-container p-5 rounded-[2rem] flex flex-col justify-between h-32">
                <span class="material-symbols-outlined text-primary text-3xl">inventory_2</span>
                <div>
                    <p class="text-xs font-medium text-on-primary-container/70">在庫品項</p>
                    <p class="text-2xl font-bold font-display">1,284</p>
                </div>
            </div>
            <div class="bg-surface-container-high p-5 rounded-[2rem] flex flex-col justify-between h-32">
                <span class="material-symbols-outlined text-secondary-industrial text-3xl">notification_important</span>
                <div>
                    <p class="text-xs font-medium text-on-surface-variant">低庫存警示</p>
                    <p class="text-2xl font-bold font-display text-secondary-industrial">12</p>
                </div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-lg font-bold font-display italic">近期作業</h2>
                <button class="text-primary text-sm font-semibold">查看全部</button>
            </div>
            
            <div class="space-y-3">
                <div class="bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border border-surface-container-low">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-tertiary-efficiency/10 flex items-center justify-center text-tertiary-efficiency">
                            <span class="material-symbols-outlined">input</span>
                        </div>
                        <div>
                            <p class="font-bold text-sm">入庫完成: SKU-9920</p>
                            <p class="text-[10px] text-on-surface-variant uppercase tracking-wider">3 分鐘前 · 操作員 A</p>
                        </div>
                    </div>
                    <p class="font-display font-bold text-tertiary-efficiency">+50</p>
                </div>

                <div class="bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border border-surface-container-low">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                            <span class="material-symbols-outlined">output</span>
                        </div>
                        <div>
                            <p class="font-bold text-sm">出庫處理: SKU-8812</p>
                            <p class="text-[10px] text-on-surface-variant uppercase tracking-wider">15 分鐘前 · 操作員 B</p>
                        </div>
                    </div>
                    <p class="font-display font-bold text-primary">-12</p>
                </div>
            </div>
        </section>

        <section class="bg-on-surface text-white p-6 rounded-[2.5rem] shadow-2xl">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h3 class="text-sm font-medium opacity-70">儲位使用率</h3>
                    <p class="text-3xl font-extrabold font-display mt-1">78.5%</p>
                </div>
                <div class="bg-white/10 px-3 py-1 rounded-full text-[10px] border border-white/20">冷藏庫 A 區</div>
            </div>
            <div class="w-full bg-white/10 h-3 rounded-full overflow-hidden">
                <div class="bg-primary h-full w-[78.5%] rounded-full shadow-[0_0_12px_#005dac]"></div>
            </div>
            <p class="mt-4 text-[10px] opacity-60 leading-relaxed font-medium uppercase tracking-widest">
                目前尚餘 142 個托盤空間可供入庫使用
            </p>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-white/80 backdrop-blur-xl shadow-[0_-12px_32px_rgba(7,30,39,0.08)] rounded-t-3xl border-t border-surface-container-low">
        
        <a href="code.html" class="flex flex-col items-center justify-center bg-primary-container text-primary rounded-2xl px-4 py-1.5 transition-all duration-300">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dashboard</span>
            <span class="text-[10px] font-bold mt-0.5">儀表板</span>
        </a>

        <a href="inventory.html" class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors duration-200">
            <span class="material-symbols-outlined">inventory_2</span>
            <span class="text-[10px] font-medium mt-0.5">庫存</span>
        </a>

        <a href="inbound.html" class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors duration-200">
            <span class="material-symbols-outlined">input</span>
            <span class="text-[10px] font-medium mt-0.5">入庫</span>
        </a>

        <a href="outbound.html" class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors duration-200">
            <span class="material-symbols-outlined">output</span>
            <span class="text-[10px] font-medium mt-0.5">出庫</span>
        </a>

        <a href="profile.html" class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors duration-200">
            <span class="material-symbols-outlined">person</span>
            <span class="text-[10px] font-medium mt-0.5">個人</span>
        </a>

    </nav>

</body>
</html>
