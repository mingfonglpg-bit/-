<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❄️ 冷凍庫管理系統 V14.2</title>
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-dark: #1e40af;
            --bg: #f8fafc; 
            --card-bg: #ffffff;
            --warning: #f59e0b; 
            --danger: #ef4444; 
            --success: #10b981; 
            --dark: #0f172a; 
            --admin: #8b5cf6; 
            --mobile: #06b6d4; 
            --text-main: #334155;
            --text-light: #64748b;
        }
        
        html, body { font-family: -apple-system, "Noto Sans TC", "Segoe UI", sans-serif; background: var(--bg); color: var(--text-main); padding: 0; margin: 0; line-height: 1.5; }

        /* 🚪 歡迎頁面 */
        #welcome-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #fff 0%, #e2e8f0 100%); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .welcome-sticker { width: 160px; margin-bottom: 25px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        .btn-enter { background: var(--primary); color: white; border: none; padding: 16px 60px; font-size: 18px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: all 0.3s; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4); }
        .btn-enter:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5); }

        /* 📊 主容器 */
        .container { width: 92%; max-width: 1100px; margin: 20px auto; background: var(--card-bg); padding: 25px; border-radius: 20px; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* 📍 地圖區域 */
        .visual-scroll-wrapper { width: 100%; overflow-x: auto; padding: 5px 0; }
        .grid-container { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; min-width: 450px; }
        .slot { aspect-ratio: 1; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 11px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #fff; transition: all 0.2s; font-weight: 600; color: var(--text-light); }
        .slot:hover { border-color: var(--primary); background: #eff6ff; }
        .slot.occupied { background: var(--primary); color: white; border: none; }
        .slot.warn { background: var(--warning) !important; color: white; border: none; }
        .slot.expire { background: var(--danger) !important; color: white; border: none; }

        /* 📱 手機模式優化 (一列 7 格) */
        .mobile-mode .grid-container { grid-template-columns: repeat(7, 1fr); min-width: 320px; }
        .mobile-mode .container { padding: 15px; width: 96%; }

        /* 統計卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { padding: 18px; border-radius: 16px; border: 1px solid #f1f5f9; text-align: center; background: #fff; position: relative; overflow: hidden; }
        .stat-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); }
        .stat-card.total-card::before { background: var(--dark); }
        .stat-card.right-card::before { background: var(--warning); }
        
        .stat-val { font-size: 26px; font-weight: 800; color: var(--dark); margin: 5px 0; }
        .progress-bg { background: #f1f5f9; height: 8px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.8s ease; }

        /* 表格樣式 */
        .table-wrapper { width: 100%; overflow-x: auto; margin-top: 20px; border: 1px solid #f1f5f9; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th { background: #f8fafc; color: var(--text-light); font-weight: 600; padding: 14px 10px; text-transform: uppercase; font-size: 13px; text-align: left; }
        td { padding: 14px 10px; border-bottom: 1px solid #f8fafc; }

        /* 按鈕與輸入 */
        .btn-toggle { padding: 9px 16px; border: 1px solid #e2e8f0; background:#fff; border-radius: 10px; cursor:pointer; font-weight:600; font-size: 13px; transition: 0.2s; }
        .btn-admin-active { color: white !important; background: var(--admin) !important; }
        .btn-mobile-active { color: white !important; background: var(--mobile) !important; }

        .search-box { width:100%; padding:15px 20px; border: 2px solid #f1f5f9; border-radius: 14px; box-sizing:border-box; font-size:16px; margin-bottom:15px; background: #f8fafc; }

        /* 🔄 載入動畫 */
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 11000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 45px; height: 45px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #report-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 12000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; }
    </style>
</head>
<body id="body-tag">

<div id="welcome-page">
    <img src="https://i.meee.com.tw/mAedyKQ.jpg" class="welcome-sticker">
    <h1 style="color:var(--dark); margin-bottom:30px;">冷凍庫管理系統</h1>
    <button class="btn-enter" onclick="enterSystem()">進入系統</button>
</div>

<div id="loader">
    <div class="spinner"></div>
    <p id="loader-text" style="margin-top:15px; font-weight: bold; color: var(--primary);">資料同步中...</p>
</div>

<div id="report-modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">回報儲位狀況</h3>
        <p id="reportTarget" style="color:var(--primary); font-weight:bold;"></p>
        <div style="margin-top:15px;">
            <label>狀況類型</label>
            <select id="reportType" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px;">
                <option value="💡 正常">正常</option>
                <option value="⚠️ 異常/標示不明">異常/標示不明</option>
                <option value="🚫 申請報廢">申請報廢</option>
                <option value="📝 備註更新">純備註更新</option>
            </select>
            <label>詳細說明</label>
            <textarea id="reportNote" style="width:100%; padding:10px; border-radius:8px; box-sizing:border-box;" rows="3" placeholder="請描述狀況..."></textarea>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeReport()" style="flex:1; padding:10px; border-radius:8px; background:#f1f5f9; border:none;">取消</button>
            <button onclick="submitReport()" style="flex:1; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px;">送出回報</button>
        </div>
    </div>
</div>

<div class="container" id="main-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; flex-wrap:wrap; gap:10px;">
        <h2 style="margin:0;">❄️ 冷凍庫管理系統 <small style="font-size:12px; color:var(--text-light);">V14.2</small></h2>
        <div style="display:flex; gap:8px;">
            <button id="mobileToggleBtn" onclick="toggleMobileMode()" class="btn-toggle">📱 手機版</button>
            <button id="adminToggleBtn" onclick="toggleAdmin()" class="btn-toggle">🛠️ 管理模式</button>
            <button onclick="fetchData()" class="btn-toggle">🔄 刷新</button>
        </div>
    </div>

    <div id="admin-panel" style="display:none; background:#fdfaff; border:2px dashed var(--admin); padding:20px; border-radius:16px; margin-bottom:25px;">
        <b style="color:var(--admin);">➕ 新增入庫紀錄</b>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top:15px;">
            <select id="addZone" style="padding:10px; border-radius:8px;"><option value="左">左庫</option><option value="右">右庫</option></select>
            <select id="addFloor" style="padding:10px; border-radius:8px;"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
            <input type="number" id="addPos" placeholder="位置" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
            <input type="text" id="addName" placeholder="品名" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
            <input type="text" id="addBatch" placeholder="批號" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
            <input type="date" id="addDate" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
            <button onclick="commitAdd()" style="background:var(--admin); color:white; border:none; border-radius:8px; cursor:pointer;">確認新增</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card total-card">
            <small>🏢 總庫使用率</small>
            <div id="totalRate" class="stat-val">0%</div>
            <div class="progress-bg"><div id="totalBar" class="progress-fill" style="background:var(--dark); width:0%;"></div></div>
            <small id="totalDetail" style="font-size:12px;">0 / 176</small>
        </div>
        <div class="stat-card left-card">
            <small>⬅️ 左庫使用率</small>
            <div id="leftRate" class="stat-val">0%</div>
            <div class="progress-bg"><div id="leftBar" class="progress-fill" style="background:var(--primary); width:0%;"></div></div>
            <small id="leftDetail" style="font-size:12px;">0 / 88</small>
        </div>
        <div class="stat-card right-card">
            <small>➡️ 右庫使用率</small>
            <div id="rightRate" class="stat-val">0%</div>
            <div class="progress-bg"><div id="rightBar" class="progress-fill" style="background:var(--warning); width:0%;"></div></div>
            <small id="rightDetail" style="font-size:12px;">0 / 88</small>
        </div>
    </div>

    <div style="background:#fff; padding:15px; border-radius:16px; margin-bottom:25px; border:1px solid #f1f5f9;">
        <div style="margin-bottom:15px; display:flex; gap:10px; align-items:center;">
            <b>📍 儲位地圖 (<span id="col-count-text">11</span>格)</b>
            <select id="vZone" onchange="renderVisual()" style="padding:5px; border-radius:5px;"><option value="左">左</option><option value="右">右</option></select>
            <select id="vFloor" onchange="renderVisual()" style="padding:5px; border-radius:5px;"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
        </div>
        <div class="visual-scroll-wrapper">
            <div id="visualGrid" class="grid-container"></div>
        </div>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜尋品名、批號、儲位..." oninput="resetPageAndRender()">

    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th>儲位</th><th>品名 / 批號</th><th>效期</th><th>備註</th><th>操作</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div style="display:flex; justify-content
