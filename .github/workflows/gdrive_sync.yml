
name: Sync Google Drive Files

on:
  schedule:
    - cron: '0 22 * * *'  # 台灣 06:00
    - cron: '50 23 * * *' # 台灣 07:50
    - cron: '30 5 * * *'  # 台灣 13:30
    - cron: '30 7 * * *'  # 台灣 15:30
    - cron: '30 9 * * *'  # 台灣 17:30
    - cron: '30 10 * * *' # 台灣 18:30
    - cron: '45 11 * * *' # 台灣 19:45
    - cron: '0 12 * * *'  # 台灣 20:00
    - cron: '0 16 * * *'  # 台灣 00:00
  workflow_dispatch:      # 保持手動執行功能
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth

      - name: Run sync script
        env:
          GDRIVE_JSON: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: python sync_script.py

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Auto sync from GDrive" || echo "No changes"
          git push
