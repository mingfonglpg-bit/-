name: Daily Google Data Sync

on:
  schedule:
    - cron: '0 14 * * *'
    - cron: '28 15 * * *'
    - cron: '50 15 * * *'
    - cron: '0 22 * * *'
    - cron: '30 23 * * *'
    - cron: '0 0 * * *'
    - cron: '0 5 * * *'
    - cron: '0 7 * * *'
    - cron: '0 10 * * *'
    - cron: '0 12 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync_data:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 檢出儲存庫
        uses: actions/checkout@v4

      - name: 2. 安裝 gdown 並下載檔案
        run: |
          pip install gdown
          mkdir -p data
          
          # 強制下載並覆寫舊檔
          # ID 替換為你的實際檔案 ID
          gdown --id 12dEZzYQ8eezygtsbtME4jfjRV0YfqMQz -O data/frozen.csv --fuzzy
          gdown --id 1TVhTXjjsoYB3ZIBQDBkWjz-2O6LFn5Hz -O data/chilled.csv --fuzzy
          gdown --id 12sOU6CMzyjH0XCqFWFxYwg7E8h78oac6 -O data/beef.csv --fuzzy

      - name: 3. 檢查變動並提交
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add data/
          
          if ! git diff --cached --quiet; then
            git commit -m "🤖 自動更新：同步 Google Drive 最新資料"
            git push
          else
            echo "無內容變動，跳過。"
          fi
