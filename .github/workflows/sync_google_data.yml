name: Daily Google Data Sync

on:
  schedule:
    - cron: '0 14 * * *'
    - cron: '28 15 * * *'
    - cron: '50 15 * * *'
    - cron: '0 22 * * *'
    - cron: '30 23 * * *'
    - cron: '0 0 * * *'
    - cron: '0 5 * * *'
    - cron: '0 7 * * *'
    - cron: '0 10 * * *'
    - cron: '0 12 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch: # 允許手動觸發

permissions:
  contents: write # 必須擁有寫入權限才能提交程式碼

jobs:
  sync_data:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 檢出儲存庫
        uses: actions/checkout@v4

      - name: 2. 安裝 gdown 並下載檔案
        run: |
          pip install gdown
          mkdir -p data
          
          # 下載檔案，使用 --no-cookies 以確保不受舊 Session 影響
          # 請確保你的檔案連結是公開的「檢視者」權限
          gdown "https://drive.google.com/uc?id=1-A8PCy049b9iY7TCaZ2RHXRXOGRNKCU1" -O data/frozen.csv --no-cookies
          gdown "https://drive.google.com/uc?id=1RNpifDnLRc3fJJuMeKA_ki52wEDTs9mo" -O data/chilled.csv --no-cookies
          gdown "https://drive.google.com/uc?id=1AIjAuNGyp8Lza_7raB_NkC7BlWUxU1SM" -O data/beef.csv --no-cookies

      - name: 3. 檢查變動並提交
        run: |
          # 設定 Git 身份
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 加入變更
          git add data/
          
          # 檢查是否有檔案變動
          if git status --porcelain | grep -q "data/"; then
            echo "偵測到檔案變動，準備提交..."
            git commit -m "🤖 自動更新：同步 Google Drive 最新資料"
            git push
          else
            echo "無任何檔案變動，無需更新。"
          fi
