<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3月庫存系統 - 欄位優化版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #eee; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .tab-btn.active { background: var(--accent); color: white; }
        .search-box { width: 100%; padding: 12px 15px; font-size: 16px; border: 2px solid #ddd; border-radius: 25px; box-sizing: border-box; outline: none; margin-bottom: 15px; }
        .table-container { min-height: 450px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: var(--primary); color: white; padding: 10px; text-align: left; font-size: 13px; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 14px; word-break: break-all; }
        .qty-tag { font-weight: bold; color: #e74c3c; background: #fdf2f2; padding: 2px 6px; border-radius: 4px; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; padding-top: 10px; border-top: 1px solid #eee; }
        .page-btn { padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .page-btn:disabled { background: #f5f5f5; color: #ccc; cursor: not-allowed; }
        .page-info { font-size: 14px; color: #666; font-weight: bold; }
        .loading { text-align: center; padding: 40px; color: #95a5a6; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('frozen', this)">❄️ 冷凍品</button>
        <button class="tab-btn" onclick="switchTab('chilled', this)">🌡️ 冷藏/常溫</button>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="搜尋關鍵字..." oninput="handleSearch()">

    <div id="loader" class="loading">⌛ 資料讀取中...</div>

    <div class="table-container">
        <table id="resultTable" style="display:none;">
            <thead>
                <tr id="tableHeader">
                    </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div id="paginationCtrl" class="pagination" style="display:none;">
        <button id="prevBtn" class="page-btn" onclick="changePage(-1)">上一頁</button>
        <span id="pageInfo" class="page-info">第 1 頁</span>
        <button id="nextBtn" class="page-btn" onclick="changePage(1)">下一頁</button>
    </div>
</div>

<script>
    const CONFIG = { frozen: 'frozen.csv', chilled: 'chilled.csv' };
    const ROWS_PER_PAGE = 10;

    let dataStore = { frozen: [], chilled: [] };
    let filteredData = [];
    let currentTab = 'frozen';
    let currentPage = 1;

    function formatExcelDate(num) {
        if (!num || isNaN(num) || num < 1000) return num || "-";
        const date = new Date(Math.round((num - 25569) * 86400 * 1000));
        return date.toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit'});
    }

    async function fetchCSV(type) {
        try {
            const response = await fetch(CONFIG[type]);
            const text = await response.text();
            Papa.parse(text, {
                complete: function(results) {
                    const rows = results.data;
                    for (let i = 1; i < rows.length && i < 411; i++) {
                        const r = rows[i];
                        if (type === 'frozen') {
                            // 冷凍：A+B+C 欄，抓 AL(37), AM(38), AN(39)
                            if (r[0] || r[1] || r[2]) {
                                dataStore.frozen.push({
                                    name: `${r[0]||''} ${r[1]||''} ${r[2]||''}`.trim(),
                                    col1: r[37] || "0", // 數量
                                    col2: r[38] || "-", // 批號
                                    col3: formatExcelDate(r[39]) // 日期
                                });
                            }
                        } else {
                            // 冷藏/常溫：A+B 欄，抓 AG(32), AH(33), AI(34), AJ(35)
                            if (r[0] || r[1]) {
                                dataStore.chilled.push({
                                    name: `${r[0]||''} ${r[1]||''}`.trim(),
                                    col1: r[32] || "0", // AG
                                    col2: r[33] || "-", // AH
                                    col3: r[34] || "-", // AI
                                    col4: r[35] || "-"  // AJ
                                });
                            }
                        }
                    }
                    if (type === 'frozen') {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('resultTable').style.display = 'table';
                        document.getElementById('paginationCtrl').style.display = 'flex';
                        handleSearch();
                    }
                }
            });
        } catch (e) { console.error(e); }
    }

    function switchTab(type, btn) {
        currentTab = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('searchInput').value = ''; 
        handleSearch();
    }

    function handleSearch() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        filteredData = dataStore[currentTab].filter(item => 
            item.name.toLowerCase().includes(keyword) || 
            (item.col2 && item.col2.toLowerCase().includes(keyword))
        );
        currentPage = 1;
        updateHeader();
        renderTable();
    }

    function updateHeader() {
        const header = document.getElementById('tableHeader');
        if (currentTab === 'frozen') {
            header.innerHTML = '<th width="50%">品項規格</th><th width="20%">數量</th><th width="30%">批號/日期</th>';
        } else {
            header.innerHTML = '<th width="40%">品項</th><th width="15%">數量</th><th width="15%">批號</th><th width="30%">效期</th>';
        }
    }

    function changePage(step) {
        currentPage += step;
        renderTable();
        window.scrollTo(0, 0);
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        const start = (currentPage - 1) * ROWS_PER_PAGE;
        const end = start + ROWS_PER_PAGE;
        const pageItems = filteredData.slice(start, end);

        if (pageItems.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:50px;">無資料</td></tr>';
        } else {
            pageItems.forEach(item => {
                const tr = document.createElement('tr');
                if (currentTab === 'frozen') {
                    tr.innerHTML = `
                        <td>${item.name}</td>
                        <td><span class="qty-tag">${item.col1}</span></td>
                        <td style="font-size:12px; color:#666;">${item.col2}<br>${item.col3}</td>
                    `;
                } else {
                    tr.innerHTML = `
                        <td>${item.name}</td>
                        <td><span class="qty-tag">${item.col1}</span></td>
                        <td>${item.col2}</td>
                        <td style="font-size:12px; color:#666;">${item.col3}<br>${item.col4}</td>
                    `;
                }
                tbody.appendChild(tr);
            });
        }

        const maxPage = Math.ceil(filteredData.length / ROWS_PER_PAGE) || 1;
        document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${maxPage} 頁`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === maxPage);
    }

    window.onload = () => {
        fetchCSV('frozen');
        fetchCSV('chilled');
    };
</script>

</body>
</html>
