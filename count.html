<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>3月庫存查詢系統 - 欄位優化版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b;
            --primary: #38bdf8; --accent: #10b981; 
            --text-main: #f1f5f9; --text-dim: #94a3b8;
            --bright-qty: #ccff00; --alert: #ff4444; 
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 12px; }
        .container { max-width: 900px; margin: auto; background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-header { margin-bottom: 20px; }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; color: var(--accent); text-decoration: none; border-radius: 12px; font-weight: bold; border: 2px solid var(--accent); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 14px; background: rgba(255,255,255,0.05); color: var(--text-dim); cursor: pointer; border-radius: 12px; font-weight: bold; border: 1px solid var(--border); }
        .tab-btn.active { background: var(--primary); color: #000; border: none; }
        .search-box { width: 100%; padding: 15px; font-size: 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; color: white; margin-bottom: 20px; }
        .table-container { min-height: 400px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th { background: rgba(0,0,0,0.4); color: var(--primary); padding: 14px 10px; text-align: left; font-size: 13px; border-bottom: 2px solid var(--border); }
        td { padding: 16px 10px; border-bottom: 1px solid var(--border); font-size: 15px; vertical-align: middle; }
        .qty-tag { font-weight: 900; color: var(--bright-qty); background: rgba(204, 255, 0, 0.1); padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(204, 255, 0, 0.2); font-family: monospace; font-size: 18px; display: inline-block; }
        .low-stock { background: var(--alert) !important; color: white !important; animation: blink 1s infinite; box-shadow: 0 0 12px var(--alert); border: none; }
        .expiry-alert { color: #fff; background: var(--alert); padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 11px; display: inline-block; margin-top: 4px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 25px; }
        .page-btn { padding: 10px 20px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: var(--text-main); border-radius: 10px; cursor: pointer; }
        .page-btn:disabled { opacity: 0.2; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-header"><a href="https://mingfonglpg-bit.github.io/-1-1/android.html" class="btn-back">⬅️ 返回庫位控管</a></div>
    <div class="tabs">
        <button id="btn-frozen" class="tab-btn active" onclick="switchTab('frozen', this)">❄️ 冷凍品庫存</button>
        <button id="btn-chilled" class="tab-btn" onclick="switchTab('chilled', this)">🌡️ 冷藏/常溫</button>
    </div>
    <input type="text" id="searchInput" class="search-box" placeholder="搜尋品項或批號..." oninput="handleSearch()">
    <div id="loader" style="text-align:center; padding:50px; color:var(--text-dim);">⌛ 正在讀取資料...</div>
    <div class="table-container">
        <table id="resultTable" style="display:none;">
            <thead><tr id="tableHeader"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div id="paginationCtrl" class="pagination" style="display:none;">
        <button id="prevBtn" class="page-btn" onclick="changePage(-1)">上一頁</button>
        <span id="pageInfo" style="color:var(--primary); font-weight:bold;">第 1 頁</span>
        <button id="nextBtn" class="page-btn" onclick="changePage(1)">下一頁</button>
    </div>
</div>

<script>
    const CONFIG = { frozen: 'frozen.csv', chilled: 'chilled.csv' };
    const ROWS_PER_PAGE = 12;
    let dataStore = { frozen: [], chilled: [] };
    let filteredData = [];
    let currentTab = 'frozen';
    let currentPage = 1;

    // 效期警示檢查
    function checkExpiry(dateStr) {
        if (!dateStr || dateStr === "-" || dateStr.trim() === "" || dateStr === "undefined") return "";
        const normalizedDate = dateStr.replace(/-/g, '/');
        const expDate = new Date(normalizedDate);
        if (isNaN(expDate.getTime())) return "";
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const diffDays = Math.ceil((expDate - today) / (1000 * 60 * 60 * 24));
        if (diffDays >= 0 && diffDays <= 14) return `<br><span class="expiry-alert">⚠️ 快到期 (${diffDays}天)</span>`;
        if (diffDays < 0) return `<br><span class="expiry-alert" style="background:#666;">❌ 已過期</span>`;
        return "";
    }

    // Excel 序號轉日期格式
    function formatExcelDate(num) {
        if (!num || isNaN(num) || num < 1000) return num || "-";
        const date = new Date(Math.round((num - 25569) * 86400 * 1000));
        return date.toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit'});
    }

    async function fetchCSV(type) {
        try {
            const response = await fetch(CONFIG[type] + '?t=' + new Date().getTime());
            const text = await response.text();
            Papa.parse(text, {
                skipEmptyLines: true,
                complete: function(results) {
                    const rows = results.data;
                    for (let i = 1; i < rows.length; i++) {
                        const r = rows[i];
                        if (!r || r.length < 5) continue;

                        if (type === 'frozen') {
                            if (r[1] || r[2]) {
                                // --- 冷凍品欄位優化：L(11), M(12), N(13) ---
                                dataStore.frozen.push({
                                    name: `${r[1]||''} ${r[2]||''}`.trim(),
                                    qty: parseFloat(r[11]) || 0, // L 欄
                                    batch: r[12] || "-",         // M 欄
                                    date: formatExcelDate(r[13]) // N 欄
                                });
                            }
                        } else {
                            // 冷藏/常溫品欄位邏輯 (維持 B, AG, AH, AI, AJ)
                            let cName = (r[1] || "").trim();
                            let cQty = r[32] ? parseFloat(r[32]) : 0;

                            if (cName !== "" && cName !== "undefined") {
                                dataStore.chilled.push({
                                    name: cName,
                                    qty: cQty,
                                    batch: r[33] || "-",
                                    date1: r[34] || "-",
                                    date2: r[35] || "-"
                                });
                            }
                        }
                    }
                    if (type === 'frozen') {
                        fetchCSV('chilled'); 
                    } else {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('resultTable').style.display = 'table';
                        document.getElementById('paginationCtrl').style.display = 'flex';
                        handleSearch();
                    }
                }
            });
        } catch (e) { console.error("CSV 加載失敗:", e); }
    }

    function handleSearch() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        filteredData = dataStore[currentTab].filter(item => 
            item.name.toLowerCase().includes(keyword) || 
            (item.batch && item.batch.toString().toLowerCase().includes(keyword))
        );
        currentPage = 1;
        updateHeader();
        renderTable();
    }

    function updateHeader() {
        const header = document.getElementById('tableHeader');
        if (currentTab === 'frozen') {
            header.innerHTML = '<th width="40%">冷凍品項</th><th width="15%">庫存量</th><th width="20%">批號</th><th width="25%">有效日期</th>';
        } else {
            header.innerHTML = '<th width="40%">冷藏/常溫品項</th><th width="15%">庫存</th><th width="15%">批號</th><th width="30%">有效日期</th>';
        }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const start = (currentPage - 1) * ROWS_PER_PAGE;
        const pageItems = filteredData.slice(start, start + ROWS_PER_PAGE);

        if (pageItems.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:50px;">查無相關庫存資料</td></tr>';
        } else {
            pageItems.forEach(item => {
                const tr = document.createElement('tr');
                const isLow = item.qty < 20 ? 'low-stock' : '';
                
                if (currentTab === 'frozen') {
                    const alert = checkExpiry(item.date);
                    tr.innerHTML = `<td><b>${item.name}</b></td><td><span class="qty-tag ${isLow}">${item.qty}</span></td><td>${item.batch}</td><td style="color:var(--text-dim); font-size:13px;">${item.date}${alert}</td>`;
                } else {
                    const alert1 = checkExpiry(item.date1);
                    const alert2 = checkExpiry(item.date2);
                    tr.innerHTML = `<td><b>${item.name}</b></td><td><span class="qty-tag ${isLow}">${item.qty}</span></td><td>${item.batch}</td><td style="color:var(--text-dim); font-size:13px;">${item.date1}${alert1}<br>${item.date2}${alert2}</td>`;
                }
                tbody.appendChild(tr);
            });
        }
        const maxPage = Math.ceil(filteredData.length / ROWS_PER_PAGE) || 1;
        document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${maxPage} 頁`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === maxPage);
    }

    function switchTab(type, btn) {
        currentTab = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        handleSearch();
    }

    function changePage(step) { currentPage += step; renderTable(); window.scrollTo(0, 0); }

    window.onload = () => { fetchCSV('frozen'); };
</script>
</body>
</html>
