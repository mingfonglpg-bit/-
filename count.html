<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>3月庫存查詢系統 - Pro版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; 
            --card-bg: #1e293b;
            --primary: #38bdf8; 
            --accent: #10b981; 
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --danger: #ff4d4d;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: -apple-system, "Noto Sans TC", sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main);
            margin: 0; 
            padding: 12px; 
            line-height: 1.5;
        }

        .container { 
            max-width: 800px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }
        
        /* 返回按鈕：綠色系，醒目導航 */
        .nav-header { margin-bottom: 20px; }
        .btn-back { 
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 24px; background: transparent; color: var(--accent); 
            text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 15px;
            border: 2px solid var(--accent); transition: 0.2s;
        }
        .btn-back:active { background: var(--accent); color: white; }

        /* 分頁切換：亮藍色系 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { 
            flex: 1; padding: 14px; border: 1px solid var(--border); 
            background: rgba(255,255,255,0.05); color: var(--text-dim);
            cursor: pointer; border-radius: 12px; font-weight: bold; font-size: 15px; 
        }
        .tab-btn.active { background: var(--primary); color: #000; border: none; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4); }

        /* 搜尋框：深色優化 */
        .search-box { 
            width: 100%; padding: 15px; font-size: 16px; 
            background: rgba(0,0,0,0.2); border: 1px solid var(--border); 
            border-radius: 12px; color: white; outline: none; margin-bottom: 20px;
            box-sizing: border-box;
        }
        .search-box:focus { border-color: var(--primary); }

        /* 表格樣式優化 */
        .table-container { min-height: 400px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.3); color: var(--primary); padding: 12px 10px; text-align: left; font-size: 13px; border-bottom: 2px solid var(--border); }
        td { padding: 16px 10px; border-bottom: 1px solid var(--border); font-size: 15px; vertical-align: middle; }
        tr:nth-child(even) { background: rgba(255,255,255,0.02); }

        /* 庫存數量標籤：極顯眼紅色 */
        .qty-tag { 
            font-weight: 900; color: var(--danger); background: rgba(255, 77, 77, 0.1); 
            padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255, 77, 77, 0.2);
            font-family: 'Courier New', monospace;
        }

        /* 頁碼控制 */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 25px; }
        .page-btn { 
            padding: 10px 20px; border: 1px solid var(--border); background: transparent; 
            color: var(--text-main); border-radius: 10px; cursor: pointer; 
        }
        .page-btn:disabled { opacity: 0.3; }
        .page-info { font-weight: bold; color: var(--primary); }

        .loading { text-align: center; padding: 50px; color: var(--text-dim); }

        @media (max-width: 480px) {
            td { font-size: 14px; padding: 12px 8px; }
            .btn-back { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-header">
        <a href="https://mingfonglpg-bit.github.io/-1-1/android.html" class="btn-back">⬅️ 返回庫位控管頁面</a>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('frozen', this)">❄️ 冷凍品庫存</button>
        <button class="tab-btn" onclick="switchTab('chilled', this)">🌡️ 冷藏/常溫</button>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="輸入產品關鍵字搜尋..." oninput="handleSearch()">

    <div id="loader" class="loading">⌛ 正在讀取庫存 CSV 資料...</div>

    <div class="table-container">
        <table id="resultTable" style="display:none;">
            <thead><tr id="tableHeader"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div id="paginationCtrl" class="pagination" style="display:none;">
        <button id="prevBtn" class="page-btn" onclick="changePage(-1)">上一頁</button>
        <span id="pageInfo" class="page-info">第 1 頁</span>
        <button id="nextBtn" class="page-btn" onclick="changePage(1)">下一頁</button>
    </div>
</div>

<script>
    // --- CSV 讀取與邏輯部分 (保持原有功能) ---
    const CONFIG = { frozen: 'frozen.csv', chilled: 'chilled.csv' };
    const ROWS_PER_PAGE = 10;
    let dataStore = { frozen: [], chilled: [] };
    let filteredData = [];
    let currentTab = 'frozen';
    let currentPage = 1;

    function formatExcelDate(num) {
        if (!num || isNaN(num) || num < 1000) return num || "-";
        const date = new Date(Math.round((num - 25569) * 86400 * 1000));
        return date.toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit'});
    }

    async function fetchCSV(type) {
        try {
            const response = await fetch(CONFIG[type]);
            const text = await response.text();
            Papa.parse(text, {
                complete: function(results) {
                    const rows = results.data;
                    for (let i = 1; i < rows.length && i < 411; i++) {
                        const r = rows[i];
                        if (type === 'frozen') {
                            if (r[0] || r[1] || r[2]) {
                                dataStore.frozen.push({
                                    name: `${r[0]||''} ${r[1]||''} ${r[2]||''}`.trim(),
                                    col1: r[37] || "0",
                                    col2: r[38] || "-",
                                    col3: formatExcelDate(r[39])
                                });
                            }
                        } else {
                            if (r[0] || r[1]) {
                                dataStore.chilled.push({
                                    name: `${r[0]||''} ${r[1]||''}`.trim(),
                                    col1: r[32] || "0",
                                    col2: r[33] || "-",
                                    col3: r[34] || "-",
                                    col4: r[35] || "-"
                                });
                            }
                        }
                    }
                    if (type === 'frozen') {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('resultTable').style.display = 'table';
                        document.getElementById('paginationCtrl').style.display = 'flex';
                        handleSearch();
                    }
                }
            });
        } catch (e) { console.error(e); }
    }

    function switchTab(type, btn) {
        currentTab = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('searchInput').value = ''; 
        handleSearch();
    }

    function handleSearch() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        filteredData = dataStore[currentTab].filter(item => 
            item.name.toLowerCase().includes(keyword) || 
            (item.col2 && item.col2.toString().toLowerCase().includes(keyword))
        );
        currentPage = 1;
        updateHeader();
        renderTable();
    }

    function updateHeader() {
        const header = document.getElementById('tableHeader');
        if (currentTab === 'frozen') {
            header.innerHTML = '<th width="45%">冷凍品項名稱</th><th width="15%">數量</th><th width="20%">批號</th><th width="20%">效期</th>';
        } else {
            header.innerHTML = '<th width="40%">冷藏/常溫品項</th><th width="15%">數量</th><th width="15%">批號</th><th width="30%">備註/效期</th>';
        }
    }

    function changePage(step) {
        currentPage += step;
        renderTable();
        window.scrollTo(0, 0);
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const start = (currentPage - 1) * ROWS_PER_PAGE;
        const pageItems = filteredData.slice(start, start + ROWS_PER_PAGE);

        if (pageItems.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:50px;">無符合搜尋結果</td></tr>';
        } else {
            pageItems.forEach(item => {
                const tr = document.createElement('tr');
                if (currentTab === 'frozen') {
                    tr.innerHTML = `<td><b>${item.name}</b></td><td><span class="qty-tag">${item.col1}</span></td><td>${item.col2}</td><td style="color:var(--text-dim); font-size:13px;">${item.col3}</td>`;
                } else {
                    tr.innerHTML = `<td><b>${item.name}</b></td><td><span class="qty-tag">${item.col1}</span></td><td>${item.col2}</td><td style="color:var(--text-dim); font-size:13px;">${item.col3}<br>${item.col4}</td>`;
                }
                tbody.appendChild(tr);
            });
        }
        const maxPage = Math.ceil(filteredData.length / ROWS_PER_PAGE) || 1;
        document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${maxPage} 頁`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === maxPage);
    }

    window.onload = () => { fetchCSV('frozen'); fetchCSV('chilled'); };
</script>

</body>
</html>
