<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>庫存查詢系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b;
            --primary: #38bdf8; --accent: #10b981; 
            --text-main: #f1f5f9; --text-dim: #94a3b8;
            --bright-qty: #ccff00; --alert: #ff4444; 
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 0; }
        .marquee-container { background: #334155; color: var(--bright-qty); padding: 8px 0; font-weight: bold; font-size: 14px; border-bottom: 1px solid var(--primary); }
        .container { max-width: 900px; margin: 15px auto; background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 1.2rem; color: var(--primary); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; background: #334155; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #0f172a; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        .search-box { width: 100%; padding: 12px 16px; background: #334155; border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 16px; margin-bottom: 15px; outline: none; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; padding: 12px 8px; border-bottom: 2px solid var(--border); color: var(--text-dim); font-size: 13px; }
        td { padding: 14px 8px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .qty-tag { background: rgba(204, 255, 0, 0.1); color: var(--bright-qty); padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        .low-stock { color: var(--alert); background: rgba(255, 68, 68, 0.1); }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; }
        .page-btn { background: #475569; border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .loading-msg { text-align: center; padding: 50px; color: var(--text-dim); }

        /* 已過期商品樣式 */
        .expired-row {
            background-color: rgba(255, 68, 68, 0.2) !important; 
            text-decoration: line-through; 
            color: var(--text-dim);
        }

        /* 👑 新增：排序欄位專用樣式 */
        .sortable-th {
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }
        .sortable-th:hover {
            color: var(--primary) !important;
        }
        .sort-icon {
            display: inline-block;
            margin-left: 5px;
            font-size: 11px;
            color: var(--text-dim);
        }
        .sortable-th:hover .sort-icon {
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="marquee-container">
    <marquee scrollamount="5">🚀 庫存資料已於 2026.05.15 更新。</marquee>
</div>

<div class="container">
    <div class="header">
        <h2>❄️ 庫存查詢系統</h2>
        <div id="updateTime" style="font-size: 12px; color: var(--text-dim);">最後更新: 26.05.15</div>
    </div>

    <div class="tabs">
        <button id="btn-frozen" class="tab-btn active" onclick="switchTab('frozen')">冷凍品</button>
        <button id="btn-chilled" class="tab-btn" onclick="switchTab('chilled')">冷藏品/常溫品</button>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="搜尋名稱或批號..." oninput="handleSearch()">

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th width="40%">品項</th>
                    <th width="15%">庫存</th>
                    <th width="25%">批號</th>
                    <th width="20%">有效日期</th>
                </tr>
            </thead>
            <tbody id="inventoryBody">
                <tr><td colspan="4" class="loading-msg">讀取中...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination">
        <button class="page-btn" id="prevBtn" onclick="changePage(-1)">◀ 上一頁</button>
        <span id="pageInfo">第 1 / 1 頁</span>
        <button class="page-btn" id="nextBtn" onclick="changePage(1)">下一頁 ▶</button>
    </div>
</div>

<script>
    /* ============================================================
       🔧 欄位索引設定區 (CSV 欄位代號參考)
       ============================================================
       0=A, 1=B, 2=C, 3=D, 4=E, 5=F, 6=G, 7=H, 8=I, 9=J, 10=K, 
       11=L, 12=M, 13=N, 14=O, 15=P, 16=Q, 17=R, 18=S, 19=T, 
       20=U, 21=V, 22=W, 23=X, 24=Y, 25=Z, 26=AA, 27=AB
       ============================================================ */
    const CONFIG = {
        // 冷凍品設定
        frozen: {
            fileName: "frozen.csv",
            idx_name: 2,   // [C 欄] 品名
            idx_qty: 28,  // [AC 欄] 數量
            idx_batch: 29, // [AD 欄] 批號
            idx_date: 30,   // [AE 欄] 有效日期
        },
        // 冷藏/常溫品設定
        chilled: {
            fileName: "chilled.csv",
            idx_name: 1,   // [B 欄] 品名
            idx_qty: 20,  // [U 欄] 數量
            idx_batch: 21, // [V 欄] 批號
            idx_date: 22,   // [W 欄] 有效日期
        }
    };
    /* ============================================================ */

    let currentAllData = []; 
    let currentFilteredData = []; 
    let currentPage = 1;
    let currentTab = 'frozen';
    const ROWS_PER_PAGE = 12;

    loadCSVData();

    function loadCSVData() {
        const settings = CONFIG[currentTab];
        Papa.parse(settings.fileName, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                currentAllData = results.data.slice(1).map(row => ({
                    name: row[settings.idx_name] || '',
                    qty: parseFloat(row[settings.idx_qty]) || 0,
                    batch: row[settings.idx_batch] || '-',
                    date: row[settings.idx_date] || '-'
                })).filter(item => item.name !== '');

                processSearchAndRender();
            },
            error: function() {
                document.getElementById('inventoryBody').innerHTML = 
                    `<tr><td colspan="4" class="loading-msg" style="color:#ff4444;">❌ 找不到 ${settings.fileName} 檔案</td></tr>`;
            }
        });
    }

    function processSearchAndRender() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        currentFilteredData = currentAllData.filter(item => 
            item.name.toLowerCase().includes(keyword) || 
            item.batch.toLowerCase().includes(keyword)
        );
        currentPage = 1;
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('inventoryBody');
        const start = (currentPage - 1) * ROWS_PER_PAGE;
        const pageData = currentFilteredData.slice(start, start + ROWS_PER_PAGE);

        if (pageData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="loading-msg">🔍 沒有符合搜尋條件的資料</td></tr>`;
        } else {
            const today = new Date();
            const warningLimit = 31 * 24 * 60 * 60 * 1000; // 31天

            tbody.innerHTML = pageData.map(item => {
                let dateStyle = 'color: var(--text-dim);'; 
                let rowClass = ''; 

                if (item.date && item.date !== '-') {
                    const expiryDate = new Date(item.date);
                    const diff = expiryDate - today;
                    
                    if (diff <= 0) {
                        // 已過期
                        dateStyle = 'color: #ff4444; font-weight: bold;';
                        rowClass = 'class="expired-row"';
                    } else if (diff <= warningLimit) {
                        // 一個月內到期
                        dateStyle = 'color: #ffae00; font-weight: bold;';
                    }
                }

                return `
                <tr ${rowClass}>
                    <td>${item.name}</td>
                    <td><span class="qty-tag ${item.qty <= 5 ? 'low-stock' : ''}">${item.qty}</span></td>
                    <td style="font-family: monospace;">${item.batch}</td>
                    <td style="${dateStyle}">${item.date}</td>
                </tr>
                `;
            }).join('');
        }
        updatePagination();
    }

    function updatePagination() {
        const totalPages = Math.ceil(currentFilteredData.length / ROWS_PER_PAGE) || 1;
        document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${totalPages} 頁`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === totalPages);
    }

    function handleSearch() {
        processSearchAndRender();
    }

    function changePage(step) {
        currentPage += step;
        renderTable();
    }

    function switchTab(tab) {
        if (currentTab === tab) return;
        currentTab = tab;
        document.getElementById('btn-frozen').classList.toggle('active', tab === 'frozen');
        document.getElementById('btn-chilled').classList.toggle('active', tab === 'chilled');
        document.getElementById('inventoryBody').innerHTML = `<tr><td colspan="4" class="loading-msg">切換中...</td></tr>`;
        loadCSVData();
    }
</script>

<script>
(function() {
    let sortConfig = {
        key: null,     
        direction: 'none' 
    };

    // 💡 關鍵智慧修復：動態獲取目前 count.html 在雲端的完整目錄路徑
    // 這能確保即使在雲端同目錄下，PapaParse 也能以完整的絕對 URL 成功抓到 CSV，避免卡死
    function getCloudFolderUrl() {
        const currentUrl = window.location.href;
        // 移除結尾的檔名或參數，保留目錄結構
        return currentUrl.substring(0, currentUrl.lastIndexOf('/')) + '/';
    }

    // 1. 攔截並升級原本的資料讀取機制
    window.customLoadCSVData = function() {
        const settings = CONFIG[currentTab];
        const folderPath = getCloudFolderUrl();
        const fullCloudCsvUrl = folderPath + settings.fileName;

        Papa.parse(fullCloudCsvUrl, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                currentAllData = results.data.slice(1).map(row => ({
                    name: row[settings.idx_name] || '',
                    qty: parseFloat(row[settings.idx_qty]) || 0,
                    batch: row[settings.idx_batch] || '-',
                    date: row[settings.idx_date] || '-'
                })).filter(item => item.name !== '');

                window.customProcessAndRender();
            },
            error: function() {
                // 如果完整的雲端路徑因為空間權限仍被阻擋，降級改用原始相對路徑重試
                Papa.parse(settings.fileName, {
                    download: true,
                    header: false,
                    skipEmptyLines: true,
                    complete: function(res) {
                        currentAllData = res.data.slice(1).map(row => ({
                            name: row[settings.idx_name] || '',
                            qty: parseFloat(row[settings.idx_qty]) || 0,
                            batch: row[settings.idx_batch] || '-',
                            date: row[settings.idx_date] || '-'
                        })).filter(item => item.name !== '');
                        window.customProcessAndRender();
                    },
                    error: function() {
                        document.getElementById('inventoryBody').innerHTML = 
                            `<tr><td colspan="4" class="loading-msg" style="color:#ff4444;">❌ 無法讀取 ${settings.fileName}<br><span style="font-size:11px;">請確認 CSV 檔案已開啟共用/檢視權限</span></td></tr>`;
                    }
                });
            }
        });
    };
    // 覆蓋原本的讀取函式
    window.loadCSVData = window.customLoadCSVData;

    // 2. 整合排序與搜尋核心邏輯
    window.customProcessAndRender = function() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        window.currentFilteredData = window.currentAllData.filter(item => 
            item.name.toLowerCase().includes(keyword) || 
            item.batch.toLowerCase().includes(keyword)
        );

        if (sortConfig.key && sortConfig.direction !== 'none') {
            window.currentFilteredData.sort((a, b) => {
                let valA = a[sortConfig.key];
                let valB = b[sortConfig.key];

                if (valA === '-' || !valA) return 1;
                if (valB === '-' || !valB) return -1;

                if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });
        }

        window.currentPage = 1;
        window.renderTable();
    };
    window.processSearchAndRender = window.customProcessAndRender;

    // 3. 初始化排序 UI 元件
    function initSortUI() {
        const thElements = document.querySelectorAll('table thead th');
        if (thElements.length < 4) return; 

        const batchTh = thElements[2]; 
        const dateTh = thElements[3];  

        batchTh.classList.add('sortable-th');
        batchTh.innerHTML = '批號 <span id="sort-icon-batch" class="sort-icon">↕</span>';
        batchTh.addEventListener('click', () => handleSortClick('batch'));

        dateTh.classList.add('sortable-th');
        dateTh.innerHTML = '有效日期 <span id="sort-icon-date" class="sort-icon">↕</span>';
        dateTh.addEventListener('click', () => handleSortClick('date'));
    }

    function handleSortClick(key) {
        if (sortConfig.key === key) {
            if (sortConfig.direction === 'none') sortConfig.direction = 'asc';
            else if (sortConfig.direction === 'asc') sortConfig.direction = 'desc';
            else sortConfig.direction = 'none';
        } else {
            sortConfig.key = key;
            sortConfig.direction = 'asc';
        }

        updateSortIcons();
        window.customProcessAndRender();
    }

    function updateSortIcons() {
        const batchIcon = document.getElementById('sort-icon-batch');
        const dateIcon = document.getElementById('sort-icon-date');
        
        if (!batchIcon || !dateIcon) return;

        batchIcon.innerHTML = '↕';
        dateIcon.innerHTML = '↕';

        if (sortConfig.direction !== 'none') {
            const icon = sortConfig.direction === 'asc' ? '▲' : '▼';
            if (sortConfig.key === 'batch') batchIcon.innerHTML = icon;
            if (sortConfig.key === 'date') dateIcon.innerHTML = icon;
        }
    }

    const originalSwitchTab = window.switchTab;
    window.switchTab = function(tab) {
        sortConfig.key = null;
        sortConfig.direction = 'none';
        updateSortIcons();
        originalSwitchTab(tab);
    };

    // 執行初始化
    initSortUI();
    // 主動補執行一次，確保雲端檔案重新發送請求
    window.loadCSVData();
})();
</script>

</body>
</html>
