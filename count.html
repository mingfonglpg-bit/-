<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>3月庫存查詢系統 - 智能監控版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; 
            --card-bg: #1e293b;
            --primary: #38bdf8; 
            --accent: #10b981; 
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --bright-qty: #ccff00; /* 螢光黃 */
            --alert: #ff4444; /* 警示紅 */
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, "Noto Sans TC", sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main);
            margin: 0; padding: 12px; line-height: 1.5;
        }

        .container { 
            max-width: 900px; margin: auto; background: var(--card-bg); 
            padding: 20px; border-radius: 20px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* 返回按鈕 */
        .nav-header { margin-bottom: 20px; }
        .btn-back { 
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 24px; background: transparent; color: var(--accent); 
            text-decoration: none; border-radius: 12px; font-weight: bold; border: 2px solid var(--accent);
            transition: 0.2s;
        }
        .btn-back:active { background: var(--accent); color: white; }

        /* 分頁按鈕 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { 
            flex: 1; padding: 14px; border: 1px solid var(--border); 
            background: rgba(255,255,255,0.05); color: var(--text-dim);
            cursor: pointer; border-radius: 12px; font-weight: bold;
        }
        .tab-btn.active { background: var(--primary); color: #000; border: none; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.5); }

        /* 搜尋框 */
        .search-box { 
            width: 100%; padding: 15px; font-size: 16px; 
            background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
            border-radius: 12px; color: white; outline: none; margin-bottom: 20px;
        }

        /* 表格與提醒樣式 */
        .table-container { min-height: 400px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: rgba(0,0,0,0.4); color: var(--primary); padding: 14px 10px; text-align: left; font-size: 13px; border-bottom: 2px solid var(--border); }
        td { padding: 16px 10px; border-bottom: 1px solid var(--border); font-size: 15px; vertical-align: middle; }
        tr:nth-child(even) { background: rgba(255,255,255,0.02); }

        /* 庫存標籤 */
        .qty-tag { 
            font-weight: 900; color: var(--bright-qty); background: rgba(204, 255, 0, 0.1); 
            padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(204, 255, 0, 0.2);
            font-family: monospace; font-size: 18px; display: inline-block;
        }

        /* 安全庫存警示 (低於20) */
        .low-stock { 
            background: var(--alert) !important; color: white !important; 
            border: none; animation: blink 1s infinite;
            box-shadow: 0 0 12px var(--alert);
        }

        /* 到期警示 */
        .expiry-alert { color: var(--alert); font-weight: bold; font-size: 11px; display: block; margin-top: 4px; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* 頁碼 */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 25px; }
        .page-btn { padding: 10px 20px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: var(--text-main); border-radius: 10px; cursor: pointer; }
        .page-btn:disabled { opacity: 0.2; }
        .page-info { font-weight: bold; color: var(--primary); }

        .loading { text-align: center; padding: 50px; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-header">
        <a href="https://mingfonglpg-bit.github.io/-1-1/android.html" class="btn-back">⬅️ 返回庫位控管頁面</a>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('frozen', this)">❄️ 冷凍品庫存</button>
        <button class="tab-btn" onclick="switchTab('chilled', this)">🌡️ 冷藏/常溫</button>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="搜尋產品名稱、批號..." oninput="handleSearch()">

    <div id="loader" class="loading">📡 正在同步雲端庫存數據...</div>

    <div class="table-container">
        <table id="resultTable" style="display:none;">
            <thead><tr id="tableHeader"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div id="paginationCtrl" class="pagination" style="display:none;">
        <button id="prevBtn" class="page-btn" onclick="changePage(-1)">上一頁</button>
        <span id="pageInfo" class="page-info">第 1 頁</span>
        <button id="nextBtn" class="page-btn" onclick="changePage(1)">下一頁</button>
    </div>
</div>

<script>
    const CONFIG = { frozen: 'frozen.csv', chilled: 'chilled.csv' };
    const ROWS_PER_PAGE = 12;
    let dataStore = { frozen: [], chilled: [] };
    let filteredData = [];
    let currentTab = 'frozen';
    let currentPage = 1;

    // 檢查是否在 14 天內到期
    function checkExpiry(dateStr) {
        if (!dateStr || dateStr === "-") return "";
        const parts = dateStr.split('/');
        if (parts.length !== 3) return "";
        const expDate = new Date(parts[0], parts[1] - 1, parts[2]);
        const today = new Date();
        const diff = (expDate - today) / (1000 * 60 * 60 * 24);
        return (diff >= 0 && diff <= 14) ? '<span class="expiry-alert">⚠️ 快到期 (14D)</span>' : "";
    }

    function formatExcelDate(num) {
        if (!num || isNaN(num) || num < 1000) return num || "-";
        const date = new Date(Math.round((num - 25569) * 86400 * 1000));
        return date.toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit'});
    }

    async function fetchCSV(type) {
        try {
            const response = await fetch(CONFIG[type]);
            const text = await response.text();
            Papa.parse(text, {
                complete: function(results) {
                    const rows = results.data;
                    for (let i = 1; i < rows.length && i < 411; i++) {
                        const r = rows[i];
                        if (type === 'frozen') {
                            if (r[1] || r[2]) {
                                dataStore.frozen.push({
                                    name: `${r[1]||''} ${r[2]||''}`.trim(),
                                    qty: parseFloat(r[37]) || 0, // AL欄
                                    batch: r[38] || "-",          // AM欄
                                    date: formatExcelDate(r[39]) // AN欄
                                });
                            }
                        } else {
                            if (r[0]) {
                                dataStore.chilled.push({
                                    name: r[0].trim(),           // A欄
                                    qty: parseFloat(r[1]) || 0,  // B欄
                                    batch: r[33] || "-", 
                                    date1: r[34] || "-",         // AI欄
                                    date2: r[35] || "-"          // AJ欄
                                });
                            }
                        }
                    }
                    if (type === 'frozen') {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('resultTable').style.display = 'table';
                        document.getElementById('paginationCtrl').style.display = 'flex';
                        handleSearch();
                    }
                }
            });
        } catch (e) { console.error("讀取失敗:", e); }
    }

    function handleSearch() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        filteredData = dataStore[currentTab].filter(item => 
            item.name.toLowerCase().includes(keyword) || 
            (item.batch && item.batch.toString().toLowerCase().includes(keyword))
        );
        currentPage = 1;
        updateHeader();
        renderTable();
    }

    function updateHeader() {
        const header = document.getElementById('tableHeader');
        if (currentTab === 'frozen') {
            header.innerHTML = '<th width="40%">冷凍品項</th><th width="15%">庫存量</th><th width="20%">批號</th><th width="25%">有效日期</th>';
        } else {
            header.innerHTML = '<th width="40%">冷藏品項</th><th width="15%">庫存量</th><th width="15%">批號</th><th width="30%">有效日期</th>';
        }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const start = (currentPage - 1) * ROWS_PER_PAGE;
        const pageItems = filteredData.slice(start, start + ROWS_PER_PAGE);

        pageItems.forEach(item => {
            const tr = document.createElement('tr');
            const isLow = item.qty < 20 ? 'low-stock' : '';
            
            if (currentTab === 'frozen') {
                const alertText = checkExpiry(item.date);
                tr.innerHTML = `
                    <td><b>${item.name}</b></td>
                    <td><span class="qty-tag ${isLow}">${item.qty}</span></td>
                    <td>${item.batch}</td>
                    <td style="color:var(--text-dim); font-size:13px;">${item.date}${alertText}</td>
                `;
            } else {
                const alert1 = checkExpiry(item.date1);
                const alert2 = checkExpiry(item.date2);
                tr.innerHTML = `
                    <td><b>${item.name}</b></td>
                    <td><span class="qty-tag ${isLow}">${item.qty}</span></td>
                    <td>${item.batch}</td>
                    <td style="color:var(--text-dim); font-size:13px;">${item.date1}${alert1}<br>${item.date2}${alert2}</td>
                `;
            }
            tbody.appendChild(tr);
        });
        
        const maxPage = Math.ceil(filteredData.length / ROWS_PER_PAGE) || 1;
        document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${maxPage} 頁`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === maxPage);
    }

    function switchTab(type, btn) {
        currentTab = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        handleSearch();
    }

    function changePage(step) { currentPage += step; renderTable(); window.scrollTo(0, 0); }

    window.onload = () => { fetchCSV('frozen'); fetchCSV('chilled'); };
</script>
</body>
</html>
