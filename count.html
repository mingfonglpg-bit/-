<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>❄️ 庫存精確查詢系統 V26.04</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b;
            --primary: #38bdf8; --accent: #10b981; 
            --text-main: #f1f5f9; --text-dim: #94a3b8;
            --bright-qty: #ccff00; --alert: #ff4444; 
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 跑馬燈 */
        .marquee-container { background: #1e293b; color: var(--bright-qty); padding: 10px 0; font-weight: bold; font-size: 14px; border-bottom: 2px solid var(--primary); }
        
        .container { max-width: 900px; margin: 15px auto; background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 頁籤 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; background: #334155; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 16px; border: 1px solid transparent; }
        .tab-btn.active { background: var(--primary); color: #0f172a; box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); border-color: white; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 5px; }
        h2 { margin: 0; font-size: 1.3rem; color: var(--primary); }
        
        .search-box { width: 100%; padding: 15px 18px; background: #0f172a; border: 1px solid var(--primary); border-radius: 12px; color: white; font-size: 16px; margin-bottom: 20px; outline: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
        .search-box:focus { border-color: var(--bright-qty); }

        /* 表格樣式 */
        .table-wrapper { overflow-x: auto; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; padding: 12px 10px; border-bottom: 2px solid var(--border); color: var(--text-dim); font-size: 13px; text-transform: uppercase; }
        td { padding: 16px 10px; border-bottom: 1px solid var(--border); font-size: 15px; }
        
        .qty-tag { background: rgba(204, 255, 0, 0.15); color: var(--bright-qty); padding: 5px 12px; border-radius: 8px; font-weight: bold; font-family: 'Courier New', Courier, monospace; border: 1px solid rgba(204, 255, 0, 0.3); }
        .low-stock { color: var(--alert); background: rgba(255, 68, 68, 0.15); border-color: rgba(255, 68, 68, 0.3); }
        
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 25px; padding-bottom: 10px; }
        .page-btn { background: #334155; border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .page-btn:hover:not(:disabled) { background: var(--primary); color: #0f172a; }
        .page-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        
        .loading-overlay { text-align: center; padding: 40px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="marquee-container">
    <marquee scrollamount="6">🚀 庫存資料已於 2026.04.10 完成更新。冷凍品項對應 C/R/S/T 欄位，冷藏常溫對應 B/K/L/M 欄位。現場作業請務必核對批號。</marquee>
</div>

<div class="container">
    <div class="header">
        <h2>❄️ 庫存查詢系統</h2>
        <div id="updateTime" style="font-size: 12px; color: var(--text-dim);">更新日期: 26.04.10</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-frozen" onclick="switchTab('frozen', this)">冷凍類</button>
        <button class="tab-btn" id="btn-normal" onclick="switchTab('normal', this)">冷藏/常溫</button>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="🔍 輸入名稱、批號或關鍵字搜尋..." oninput="handleSearch()">

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th width="40%">品項名稱</th>
                    <th width="15%">庫存量</th>
                    <th width="20%">批號</th>
                    <th width="25%">有效日期</th>
                </tr>
            </thead>
            <tbody id="inventoryBody">
                <tr><td colspan="4" class="loading-overlay">正在讀取 CSV 資料庫...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination">
        <button class="page-btn" id="prevBtn" onclick="changePage(-1)">◀ 上一頁</button>
        <span id="pageInfo" style="font-weight: bold; color: var(--primary);">第 1 / 1 頁</span>
        <button class="page-btn" id="nextBtn" onclick="changePage(1)">下一頁 ▶</button>
    </div>
</div>

<script>
    let allCsvData = [];    // 存原始所有 CSV 列
    let currentData = [];   // 存目前分類下的所有項目
    let filteredData = [];  // 存搜尋後的結果
    let currentPage = 1;
    let currentTab = 'frozen';
    const ROWS_PER_PAGE = 10;

    // 啟動載入
    Papa.parse("frozen.csv", {
        download: true,
        header: false,
        skipEmptyLines: true,
        complete: function(results) {
            allCsvData = results.data;
            processData(); // 初次解析資料
        },
        error: function() {
            document.getElementById('inventoryBody').innerHTML = '<tr><td colspan="4" style="text-align:center; color:red; padding:30px;">❌ 找不到 frozen.csv 檔案，請確認檔案位置。</td></tr>';
        }
    });

    function processData() {
        // 定義欄位索引 (0開始計數：A=0, B=1, C=2, D=3...)
        // 冷凍: 品名(C=2), 庫存(R=17), 批號(S=18), 效期(T=19)
        // 冷藏: 品名(B=1), 庫存(K=10), 批號(L=11), 效期(M=12)
        let idx = (currentTab === 'frozen') 
            ? { name: 2, qty: 17, batch: 18, date: 19 } 
            : { name: 1, qty: 10, batch: 11, date: 12 };

        currentData = allCsvData.map(row => {
            if (!row[idx.name]) return null;
            
            // 清理庫存量數字 (處理掉逗號、括號等非數字字元)
            let rawQty = row[idx.qty] ? row[idx.qty].toString().replace(/[^\d.-]/g, '') : "0";
            let parsedQty = parseFloat(rawQty);

            return {
                name: row[idx.name].trim(),
                qty: isNaN(parsedQty) ? 0 : parsedQty,
                batch: row[idx.batch] ? row[idx.batch].trim() : "--",
                date: row[idx.date] ? row[idx.date].trim() : "--"
            };
        }).filter(item => {
            // 過濾：品項不能為空、排除標題列、庫存量不能為 0
            return item !== null && 
                   item.name !== "" && 
                   item.name !== "品項" && 
                   item.name !== "品名" && 
                   item.qty !== 0;
        });

        handleSearch(); // 套用搜尋過濾並渲染
    }

    function switchTab(type, btn) {
        currentTab = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPage = 1;
        document.getElementById('searchInput').value = ""; // 切換分類時重置搜尋
        processData();
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        
        filteredData = currentData.filter(item => 
            item.name.toLowerCase().includes(query) || 
            item.batch.toLowerCase().includes(query)
        );
        
        currentPage = 1;
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('inventoryBody');
        tbody.innerHTML = '';

        const start = (currentPage - 1) * ROWS_PER_PAGE;
        const pageItems = filteredData.slice(start, start + ROWS_PER_PAGE);

        if (pageItems.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:50px; color:var(--text-dim);">查無對應庫存資料</td></tr>';
        } else {
            pageItems.forEach(item => {
                const tr = document.createElement('tr');
                const isLow = item.qty < 10 ? 'low-stock' : '';
                tr.innerHTML = `
                    <td><b style="color:white;">${item.name}</b></td>
                    <td><span class="qty-tag ${isLow}">${item.qty}</span></td>
                    <td>${item.batch}</td>
                    <td style="color:var(--text-dim); font-size:13px;">${item.date}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 分頁資訊更新
        const maxPage = Math.ceil(filteredData.length / ROWS_PER_PAGE) || 1;
        document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${maxPage} 頁`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === maxPage);
    }

    function changePage(step) {
        const maxPage = Math.ceil(filteredData.length / ROWS_PER_PAGE) || 1;
        currentPage += step;
        if (currentPage < 1) currentPage = 1;
        if (currentPage > maxPage) currentPage = maxPage;
        renderTable();
        window.scrollTo(0, 0); // 換頁後自動回頂部
    }
</script>

</body>
</html>
