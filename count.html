<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>❄️ 庫存查詢系統 V26.04.10</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b;
            --primary: #38bdf8; --accent: #10b981; 
            --text-main: #f1f5f9; --text-dim: #94a3b8;
            --bright-qty: #ccff00; --alert: #ff4444; 
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 0; }
        
        .marquee-container { background: #1e293b; color: var(--bright-qty); padding: 10px 0; font-weight: bold; font-size: 14px; border-bottom: 2px solid var(--primary); }
        
        .container { max-width: 900px; margin: 15px auto; background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; background: #334155; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 16px; }
        .tab-btn.active { background: var(--primary); color: #0f172a; box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 1.3rem; color: var(--primary); }
        
        .search-box { width: 100%; padding: 15px; background: #0f172a; border: 1px solid var(--primary); border-radius: 12px; color: white; font-size: 16px; margin-bottom: 20px; outline: none; }

        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; padding: 12px 10px; border-bottom: 2px solid var(--border); color: var(--text-dim); font-size: 13px; }
        td { padding: 16px 10px; border-bottom: 1px solid var(--border); font-size: 15px; }
        
        .qty-tag { background: rgba(204, 255, 0, 0.1); color: var(--bright-qty); padding: 5px 12px; border-radius: 8px; font-weight: bold; border: 1px solid rgba(204, 255, 0, 0.3); }
        .low-stock { color: var(--alert); background: rgba(255, 68, 68, 0.1); border-color: rgba(255, 68, 68, 0.3); }
        
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 25px; }
        .page-btn { background: #334155; border: 1px solid var(--border); color: white; padding: 8px 18px; border-radius: 10px; cursor: pointer; }
        .page-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="marquee-container">
    <marquee scrollamount="6">🚀 2026.04.10 更新：冷凍讀取 frozen.csv，冷藏常溫讀取 chilled.csv，請切換頁籤查詢。</marquee>
</div>

<div class="container">
    <div class="header">
        <h2>❄️ 庫存查詢系統</h2>
        <div id="status" style="font-size: 12px; color: var(--accent);">系統就緒</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-frozen" onclick="switchTab('frozen')">冷凍類</button>
        <button class="tab-btn" id="tab-chilled" onclick="switchTab('chilled')">冷藏/常溫</button>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜尋名稱或批號..." oninput="handleSearch()">

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th width="40%">品項名稱</th>
                    <th width="15%">庫存量</th>
                    <th width="20%">批號</th>
                    <th width="25%">有效日期</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>

    <div class="pagination">
        <button class="page-btn" id="prevBtn" onclick="changePage(-1)">◀ 上一頁</button>
        <span id="pageInfo">第 1 / 1 頁</span>
        <button class="page-btn" id="nextBtn" onclick="changePage(1)">下一頁 ▶</button>
    </div>
</div>

<script>
    let currentData = [];
    let filteredData = [];
    let currentPage = 1;
    let currentTab = 'frozen';
    const ROWS_PER_PAGE = 10;

    // 初始載入
    window.onload = () => loadData('frozen.csv');

    function loadData(fileName) {
        document.getElementById('status').innerText = "正在讀取 " + fileName + "...";
        Papa.parse(fileName, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                parseData(results.data);
                document.getElementById('status').innerText = "最後更新: 26.04.10";
            },
            error: function() {
                document.getElementById('inventoryBody').innerHTML = `<tr><td colspan="4" style="text-align:center; color:red; padding:30px;">❌ 找不到 ${fileName} 檔案</td></tr>`;
            }
        });
    }

    function parseData(allRows) {
        // 冷凍(frozen.csv): C=2, R=17, S=18, T=19
        // 冷藏(chilled.csv): B=1, K=10, L=11, M=12
        let idx = (currentTab === 'frozen') 
            ? { name: 2, qty: 17, batch: 18, date: 19 } 
            : { name: 1, qty: 10, batch: 11, date: 12 };

        currentData = allRows.map(row => {
            if (!row[idx.name]) return null;
            let rawQty = row[idx.qty] ? row[idx.qty].toString().replace(/[^\d.-]/g, '') : "0";
            let parsedQty = parseFloat(rawQty);
            return {
                name: row[idx.name].trim(),
                qty: isNaN(parsedQty) ? 0 : parsedQty,
                batch: row[idx.batch] ? row[idx.batch].trim() : "--",
                date: row[idx.date] ? row[idx.date].trim() : "--"
            };
        }).filter(item => {
            return item !== null && item.name !== "" && item.name !== "品項" && item.name !== "品名" && item.qty !== 0;
        });

        handleSearch();
    }

    function switchTab(type) {
        currentTab = type;
        currentPage = 1;
        document.getElementById('searchInput').value = "";
        
        // 切換按鈕樣式
        document.getElementById('tab-frozen').classList.toggle('active', type === 'frozen');
        document.getElementById('tab-chilled').classList.toggle('active', type === 'chilled');
        
        // 根據選擇載入不同檔案
        loadData(type === 'frozen' ? 'frozen.csv' : 'chilled.csv');
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        filteredData = currentData.filter(item => 
            item.name.toLowerCase().includes(query) || 
            item.batch.toLowerCase().includes(query)
        );
        currentPage = 1;
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('inventoryBody');
        tbody.innerHTML = '';
        const start = (currentPage - 1) * ROWS_PER_PAGE;
        const pageItems = filteredData.slice(start, start + ROWS_PER_PAGE);

        if (pageItems.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:50px; color:var(--text-dim);">無庫存資料</td></tr>';
        } else {
            pageItems.forEach(item => {
                const tr = document.createElement('tr');
                const isLow = item.qty < 10 ? 'low-stock' : '';
                tr.innerHTML = `
                    <td><b style="color:white;">${item.name}</b></td>
                    <td><span class="qty-tag ${isLow}">${item.qty}</span></td>
                    <td>${item.batch}</td>
                    <td style="color:var(--text-dim);">${item.date}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        const maxPage = Math.ceil(filteredData.length / ROWS_PER_PAGE) || 1;
        document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${maxPage} 頁`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === maxPage);
    }

    function changePage(step) {
        currentPage += step;
        renderTable();
    }
</script>
</body>
</html>
