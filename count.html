<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3月庫存查詢系統 Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --primary: #6366f1; 
            --accent: #0ea5e9; 
            --bg: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --qty-bg: rgba(239, 68, 68, 0.15);
            --qty-text: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main); 
            margin: 0; 
            padding: 10px;
            min-height: 100vh;
        }

        .container { 
            max-width: 800px; 
            margin: auto; 
            background: var(--card-bg); 
            backdrop-filter: blur(15px);
            padding: 20px; 
            border-radius: 24px; 
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* 返回按鈕優化 */
        .nav-header { margin-bottom: 20px; }
        .btn-back { 
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 20px; background: rgba(255,255,255,0.05); color: white; 
            text-decoration: none; border-radius: 14px; font-weight: 600; font-size: 14px;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .btn-back:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }

        /* 分頁標籤優化 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 16px; }
        .tab-btn { 
            flex: 1; padding: 12px; border: none; background: transparent; 
            color: var(--text-dim); cursor: pointer; border-radius: 12px; 
            font-weight: bold; font-size: 14px; transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        /* 搜尋框優化 */
        .search-box { 
            width: 100%; padding: 15px 20px; font-size: 16px; 
            background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); 
            border-radius: 18px; color: white; outline: none; margin-bottom: 20px;
            transition: 0.3s;
        }
        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        /* 表格優化 */
        .table-container { min-height: 400px; overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: rgba(255,255,255,0.05); color: var(--text-dim); padding: 12px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 16px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .qty-tag { 
            font-weight: 800; color: var(--qty-text); background: var(--qty-bg); 
            padding: 4px 10px; border-radius: 8px; font-family: monospace; font-size: 15px;
        }

        /* 頁碼優化 */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 25px; }
        .page-btn { 
            padding: 10px 18px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); 
            color: white; border-radius: 12px; cursor: pointer; font-size: 14px;
        }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-info { font-size: 13px; color: var(--text-dim); font-weight: 600; }

        .loading { text-align: center; padding: 60px; color: var(--text-dim); font-style: italic; }

        /* 手機版適配 */
        @media screen and (max-width: 600px) {
            .container { padding: 15px; border-radius: 20px; }
            td, th { padding: 10px 8px; font-size: 13px; }
            .qty-tag { padding: 2px 6px; font-size: 13px; }
            .btn-back { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-header">
        <a href="https://mingfonglpg-bit.github.io/-1-1/android.html" class="btn-back">⬅️ 返回庫位控管頁面</a>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('frozen', this)">❄️ 冷凍品</button>
        <button class="tab-btn" onclick="switchTab('chilled', this)">🌡️ 冷藏/常溫</button>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="輸入產品或批號關鍵字..." oninput="handleSearch()">

    <div id="loader" class="loading">正在同步雲端庫存數據...</div>

    <div class="table-container">
        <table id="resultTable" style="display:none;">
            <thead><tr id="tableHeader"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div id="paginationCtrl" class="pagination" style="display:none;">
        <button id="prevBtn" class="page-btn" onclick="changePage(-1)">上一頁</button>
        <span id="pageInfo" class="page-info">PAGE 1 / 1</span>
        <button id="nextBtn" class="page-btn" onclick="changePage(1)">下一頁</button>
    </div>
</div>

<script>
    // --- 原始邏輯保留 ---
    const CONFIG = { frozen: 'frozen.csv', chilled: 'chilled.csv' };
    const ROWS_PER_PAGE = 10;
    let dataStore = { frozen: [], chilled: [] };
    let filteredData = [];
    let currentTab = 'frozen';
    let currentPage = 1;

    function formatExcelDate(num) {
        if (!num || isNaN(num) || num < 1000) return num || "-";
        const date = new Date(Math.round((num - 25569) * 86400 * 1000));
        return date.toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit'});
    }

    async function fetchCSV(type) {
        try {
            const response = await fetch(CONFIG[type]);
            const text = await response.text();
            Papa.parse(text, {
                complete: function(results) {
                    const rows = results.data;
                    for (let i = 1; i < rows.length && i < 411; i++) {
                        const r = rows[i];
                        if (type === 'frozen') {
                            if (r[0] || r[1] || r[2]) {
                                dataStore.frozen.push({
                                    name: `${r[0]||''} ${r[1]||''} ${r[2]||''}`.trim(),
                                    col1: r[37] || "0",
                                    col2: r[38] || "-",
                                    col3: formatExcelDate(r[39])
                                });
                            }
                        } else {
                            if (r[0] || r[1]) {
                                dataStore.chilled.push({
                                    name: `${r[0]||''} ${r[1]||''}`.trim(),
                                    col1: r[32] || "0",
                                    col2: r[33] || "-",
                                    col3: r[34] || "-",
                                    col4: r[35] || "-"
                                });
                            }
                        }
                    }
                    if (type === 'frozen') {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('resultTable').style.display = 'table';
                        document.getElementById('paginationCtrl').style.display = 'flex';
                        handleSearch();
                    }
                }
            });
        } catch (e) { console.error(e); }
    }

    function switchTab(type, btn) {
        currentTab = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('searchInput').value = ''; 
        handleSearch();
    }

    function handleSearch() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        filteredData = dataStore[currentTab].filter(item => 
            item.name.toLowerCase().includes(keyword) || 
            (item.col2 && item.col2.toString().toLowerCase().includes(keyword))
        );
        currentPage = 1;
        updateHeader();
        renderTable();
    }

    function updateHeader() {
        const header = document.getElementById('tableHeader');
        if (currentTab === 'frozen') {
            header.innerHTML = '<th width="45%">冷凍品項</th><th width="15%">數量</th><th width="20%">批號</th><th width="20%">效期</th>';
        } else {
            header.innerHTML = '<th width="40%">冷藏/常溫</th><th width="15%">數量</th><th width="15%">規格</th><th width="30%">有效日期</th>';
        }
    }

    function changePage(step) { currentPage += step; renderTable(); window.scrollTo(0, 0); }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const start = (currentPage - 1) * ROWS_PER_PAGE;
        const pageItems = filteredData.slice(start, start + ROWS_PER_PAGE);

        if (pageItems.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:50px; color:var(--text-dim);">未找到相關資料</td></tr>';
        } else {
            pageItems.forEach(item => {
                const tr = document.createElement('tr');
                if (currentTab === 'frozen') {
                    tr.innerHTML = `<td><b>${item.name}</b></td><td><span class="qty-tag">${item.col1}</span></td><td><code>${item.col2}</code></td><td style="color:var(--text-dim); font-size:12px;">${item.col3}</td>`;
                } else {
                    tr.innerHTML = `<td><b>${item.name}</b></td><td><span class="qty-tag">${item.col1}</span></td><td><small>${item.col2}</small></td><td style="color:var(--text-dim); font-size:12px;">${item.col3}<br>${item.col4}</td>`;
                }
                tbody.appendChild(tr);
            });
        }
        const maxPage = Math.ceil(filteredData.length / ROWS_PER_PAGE) || 1;
        document.getElementById('pageInfo').innerText = `PAGE ${currentPage} / ${maxPage}`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === maxPage);
    }

    window.onload = () => { fetchCSV('frozen'); fetchCSV('chilled'); };
</script>
</body>
</html>
