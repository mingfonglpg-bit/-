<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>庫存查詢系統 - </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b;
            --primary: #38bdf8; --accent: #10b981; 
            --text-main: #f1f5f9; --text-dim: #94a3b8;
            --bright-qty: #ccff00; --alert: #ff4444; 
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 0; }
        .marquee-container { background: #334155; color: var(--bright-qty); padding: 8px 0; font-weight: bold; font-size: 14px; border-bottom: 1px solid var(--primary); }
        .container { max-width: 900px; margin: 15px auto; background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 1.2rem; color: var(--primary); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; background: #334155; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #0f172a; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        .search-box { width: 100%; padding: 12px 16px; background: #334155; border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 16px; margin-bottom: 15px; outline: none; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; padding: 12px 8px; border-bottom: 2px solid var(--border); color: var(--text-dim); font-size: 13px; }
        td { padding: 14px 8px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .qty-tag { background: rgba(204, 255, 0, 0.1); color: var(--bright-qty); padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        .low-stock { color: var(--alert); background: rgba(255, 68, 68, 0.1); }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; }
        .page-btn { background: #475569; border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .loading-msg { text-align: center; padding: 50px; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="marquee-container">
    <marquee scrollamount="5">🚀 庫存資料已於 2026.04.13 完成更新。領貨請務必核對批號效期。</marquee>
</div>

<div class="container">
    <div class="header">
        <h2>❄️ 庫存查詢系統</h2>
        <div id="updateTime" style="font-size: 12px; color: var(--text-dim);">最後更新: 26.04.13</div>
    </div>

    <div class="tabs">
        <button id="btn-frozen" class="tab-btn active" onclick="switchTab('frozen')">冷凍品</button>
        <button id="btn-chilled" class="tab-btn" onclick="switchTab('chilled')">冷藏品/常溫品</button>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="搜尋名稱或批號..." oninput="handleSearch()">

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th width="40%">品項</th>
                    <th width="15%">庫存</th>
                    <th width="25%">批號</th>
                    <th width="20%">有效日期</th>
                </tr>
            </thead>
            <tbody id="inventoryBody">
                <tr><td colspan="4" class="loading-msg">讀取中...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination">
        <button class="page-btn" id="prevBtn" onclick="changePage(-1)">◀ 上一頁</button>
        <span id="pageInfo">第 1 / 1 頁</span>
        <button class="page-btn" id="nextBtn" onclick="changePage(1)">下一頁 ▶</button>
    </div>
</div>

<script>
    /**
     * ==========================================
     * 庫位控管系統 - 資料定義註記區
     * 維護人員請注意：JavaScript 索引由 0 開始計算 (A=0, B=1, C=2...)
     * ==========================================
     */
    const CONFIG = {
        frozen: {
            fileName: "frozen.csv",
            idx_name: 2,   // C 欄 (品名)
            idx_qty: 21,  // V 欄 (庫存量)
            idx_batch: 22, // W 欄 (批號)
            idx_date: 23   // X 欄 (有效日期)
        },
        chilled: {
            fileName: "chilled.csv",
            idx_name: 1,   // B 欄 (品名)
            idx_qty: 11,  // L 欄 (庫存量)
            idx_batch: 12, // M 欄 (批號)
            idx_date: 13   // N 欄 (有效日期)
        }
    };
    // ==========================================

    let currentAllData = []; // 結構化後的資料
    let currentFilteredData = []; 
    let currentPage = 1;
    let currentTab = 'frozen';
    const ROWS_PER_PAGE = 12;

    // 初始載入
    loadCSVData();

    function loadCSVData() {
        const settings = CONFIG[currentTab];
        
        Papa.parse(settings.fileName, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                // 資料轉換
                currentAllData = results.data.slice(1).map(row => ({
                    name: row[settings.idx_name] || '',
                    qty: parseFloat(row[settings.idx_qty]) || 0,
                    batch: row[settings.idx_batch] || '-',
                    date: row[settings.idx_date] || '-'
                })).filter(item => item.name !== ''); // 排除空白列

                processSearchAndRender();
            },
            error: function() {
                document.getElementById('inventoryBody').innerHTML = 
                    `<tr><td colspan="4" class="loading-msg" style="color:#ff4444;">❌ 找不到 ${settings.fileName} 檔案</td></tr>`;
            }
        });
    }

    function processSearchAndRender() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        
        // 過濾
        currentFilteredData = currentAllData.filter(item => 
            item.name.toLowerCase().includes(keyword) || 
            item.batch.toLowerCase().includes(keyword)
        );

        currentPage = 1;
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('inventoryBody');
        const start = (currentPage - 1) * ROWS_PER_PAGE;
        const pageData = currentFilteredData.slice(start, start + ROWS_PER_PAGE);

        if (pageData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="loading-msg">🔍 沒有符合搜尋條件的資料</td></tr>`;
        } else {
            tbody.innerHTML = pageData.map(item => `
                <tr>
                    <td>${item.name}</td>
                    <td><span class="qty-tag ${item.qty <= 5 ? 'low-stock' : ''}">${item.qty}</span></td>
                    <td style="font-family: monospace;">${item.batch}</td>
                    <td style="color: var(--text-dim);">${item.date}</td>
                </tr>
            `).join('');
        }

        updatePagination();
    }

    function updatePagination() {
        const totalPages = Math.ceil(currentFilteredData.length / ROWS_PER_PAGE) || 1;
        document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${totalPages} 頁`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === totalPages);
    }

    function handleSearch() {
        processSearchAndRender();
    }

    function changePage(step) {
        currentPage += step;
        renderTable();
    }

    function switchTab(tab) {
        if (currentTab === tab) return;
        currentTab = tab;
        
        // 更新 UI 狀態
        document.getElementById('btn-frozen').classList.toggle('active', tab === 'frozen');
        document.getElementById('btn-chilled').classList.toggle('active', tab === 'chilled');
        
        // 重載資料
        document.getElementById('inventoryBody').innerHTML = `<tr><td colspan="4" class="loading-msg">切換中...</td></tr>`;
        loadCSVData();
    }
</script>

</body>
</html>
