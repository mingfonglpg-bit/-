<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>4月庫存查詢系統 - 欄位修正版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b;
            --primary: #38bdf8; --accent: #10b981; 
            --text-main: #f1f5f9; --text-dim: #94a3b8;
            --bright-qty: #ccff00; --alert: #ff4444; 
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 12px; }
        .container { max-width: 900px; margin: auto; background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 1.2rem; color: var(--primary); letter-spacing: 1px; }
        
        .search-box { width: 100%; padding: 12px 16px; background: #334155; border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 16px; margin-bottom: 15px; outline: none; }
        .search-box:focus { border-color: var(--primary); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px 8px; border-bottom: 2px solid var(--border); color: var(--text-dim); font-size: 13px; }
        td { padding: 14px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        
        .qty-tag { background: rgba(204, 255, 0, 0.1); color: var(--bright-qty); padding: 4px 10px; border-radius: 6px; font-weight: bold; font-family: monospace; }
        .low-stock { color: var(--alert); background: rgba(255, 68, 68, 0.1); }
        
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border); }
        .page-btn { background: #334155; border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .expiry-alert { color: var(--alert); font-size: 11px; display: block; margin-top: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>❄️ 凍庫庫存精確查詢</h2>
        <div id="updateTime" style="font-size: 12px; color: var(--text-dim);">載入中...</div>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="輸入關鍵字搜尋品項..." oninput="handleSearch()">

    <table>
        <thead>
            <tr>
                <th width="45%">品項 (C)</th>
                <th width="15%">庫存 (R)</th>
                <th width="20%">批號 (S)</th>
                <th width="20%">效期 (T)</th>
            </tr>
        </thead>
        <tbody id="inventoryBody">
            <tr><td colspan="4" style="text-align:center; padding:50px; color:var(--text-dim);">讀取 CSV 資料中...</td></tr>
        </tbody>
    </table>

    <div class="pagination">
        <button class="page-btn" id="prevBtn" onclick="changePage(-1)">◀ 上一頁</button>
        <span id="pageInfo" style="font-size: 14px; color: var(--text-dim);">第 1 / 1 頁</span>
        <button class="page-btn" id="nextBtn" onclick="changePage(1)">下一頁 ▶</button>
    </div>
</div>

<script>
    let rawData = [];
    let filteredData = [];
    let currentPage = 1;
    const ROWS_PER_PAGE = 10;

    // 載入 CSV 檔案 (請確保 frozen.csv 與此 html 放在同一資料夾)
    Papa.parse("frozen.csv", {
        download: true,
        header: false, // 根據您的需求直接抓取欄位 index，不使用 header
        complete: function(results) {
            processData(results.data);
            document.getElementById('updateTime').innerText = "更新時間: " + new Date().toLocaleTimeString();
        }
    });

    function processData(data) {
        // 跳過標題列，從資料行開始處理
        // 欄位對應：C=2, R=17, S=18, T=19
        rawData = data.map(row => ({
            name: row[2] ? row[2].trim() : "",
            qty: row[17] ? parseFloat(row[17]) : 0,
            batch: row[18] ? row[18].trim() : "--",
            date: row[19] ? row[19].trim() : "--"
        })).filter(item => {
            // 關鍵過濾：品項不能為空 且 庫存大於 0
            return item.name !== "" && item.name !== "品項" && !isNaN(item.qty) && item.qty !== 0;
        });

        filteredData = [...rawData];
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('inventoryBody');
        tbody.innerHTML = '';

        const start = (currentPage - 1) * ROWS_PER_PAGE;
        const pageItems = filteredData.slice(start, start + ROWS_PER_PAGE);

        if (pageItems.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:50px; color:var(--text-dim);">查無相關庫存品項</td></tr>';
        } else {
            pageItems.forEach(item => {
                const tr = document.createElement('tr');
                const isLow = item.qty < 20 ? 'low-stock' : '';
                
                // 檢查是否即期 (簡單判斷是否包含近期的年份)
                const isExpiring = item.date.includes("2024") ? '<span class="expiry-alert">⚠️ 即期注意</span>' : '';

                tr.innerHTML = `
                    <td><b>${item.name}</b></td>
                    <td><span class="qty-tag ${isLow}">${item.qty}</span></td>
                    <td>${item.batch}</td>
                    <td style="color:var(--text-dim); font-size:13px;">${item.date}${isExpiring}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        const maxPage = Math.ceil(filteredData.length / ROWS_PER_PAGE) || 1;
        document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${maxPage} 頁`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === maxPage);
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        filteredData = rawData.filter(item => 
            item.name.toLowerCase().includes(query) || 
            item.batch.toLowerCase().includes(query)
        );
        currentPage = 1;
        renderTable();
    }

    function changePage(step) {
        currentPage += step;
        renderTable();
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
