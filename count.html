
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>庫存查詢系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b;
            --primary: #38bdf8; --accent: #10b981; 
            --text-main: #f1f5f9; --text-dim: #94a3b8;
            --bright-qty: #ccff00; --alert: #ff4444; 
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 0; }
        .marquee-container { background: #334155; color: var(--bright-qty); padding: 8px 0; font-weight: bold; font-size: 14px; border-bottom: 1px solid var(--primary); }
        .container { max-width: 900px; margin: 15px auto; background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 1.2rem; color: var(--primary); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 120px; padding: 12px; border: none; border-radius: 12px; background: #334155; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; text-align: center; }
        .tab-btn.active { background: var(--primary); color: #0f172a; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        
        .export-btn { background: var(--accent); color: #0f172a; display: none; }
        
        .search-box { width: 100%; padding: 12px 16px; background: #334155; border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 16px; margin-bottom: 15px; outline: none; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; padding: 12px 8px; border-bottom: 2px solid var(--border); color: var(--text-dim); font-size: 13px; }
        
        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { color: var(--primary); }
        
        td { padding: 14px 8px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .qty-tag { background: rgba(204, 255, 0, 0.1); color: var(--bright-qty); padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        .low-stock { color: var(--alert); background: rgba(255, 68, 68, 0.1); }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; }
        .page-btn { background: #475569; border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .loading-msg { text-align: center; padding: 50px; color: var(--text-dim); }

        .qty-zero-row { text-decoration: line-through; opacity: 0.6; }
        .expired-row { text-decoration: line-through; color: var(--alert) !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="marquee-container">
    <marquee scrollamount="5">🚀 庫存資料已於 2026.06.02 更新。</marquee>
</div>

<div class="container">
    <div class="header">
        <h2>❄️ 庫存查詢系統</h2>
        <div id="updateTime" style="font-size: 12px; color: var(--text-dim);">最後更新: 26.06.02</div>
    </div>

    <div class="tabs">
        <button id="btn-frozen" class="tab-btn active" onclick="switchTab('frozen')">冷凍品</button>
        <button id="btn-chilled" class="tab-btn" onclick="switchTab('chilled')">冷藏品/常溫品</button>
        <button id="btn-beef" class="tab-btn" onclick="switchTab('beef')">冷藏牛</button>
        <button id="btn-warning" class="tab-btn" onclick="switchTab('warning')">⚠️ 效期預警</button>
        <button id="btn-export" class="tab-btn export-btn" onclick="exportToExcel()">📥 匯出預警檔</button>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="搜尋名稱或批號..." oninput="handleSearch()">

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th width="40%">品項</th>
                    <th width="15%">庫存</th>
                    <th width="25%" class="sortable" onclick="toggleSort('batch')">批號 <span id="sort-batch">↕</span></th>
                    <th width="20%" class="sortable" onclick="toggleSort('date')">有效日期 <span id="sort-date">↕</span></th>
                </tr>
            </thead>
            <tbody id="inventoryBody">
                <tr><td colspan="4" class="loading-msg">讀取中...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination">
        <button class="page-btn" id="prevBtn" onclick="changePage(-1)">◀ 上一頁</button>
        <span id="pageInfo">第 1 / 1 頁</span>
        <button class="page-btn" id="nextBtn" onclick="changePage(1)">下一頁 ▶</button>
    </div>
</div>

<script>
    /* ============================================================
       🔧 欄位索引設定區 (CSV 欄位代號參考)
       ============================================================
       0=A, 1=B, 2=C, 3=D, 4=E, 5=F, 6=G, 7=H, 8=I, 9=J, 10=K, 
       11=L, 12=M, 13=N, 14=O, 15=P, 16=Q, 17=R, 18=S, 19=T, 
       20=U, 21=V, 22=W, 23=X, 24=Y, 25=Z, 26=AA, 27=AB
       ============================================================ */
    const CONFIG = {
        // 冷凍品設定
        frozen: {
            fileName: "frozen.csv",
            idx_name: 2,   // [C 欄] 品名
            idx_qty: 14,  // [O 欄] 數量
            idx_batch: 15, // [P 欄] 批號
            idx_date: 16,   // [Q 欄] 有效日期
        },
        // 冷藏/常溫品設定
        chilled: {
            fileName: "chilled.csv",
            idx_name: 1,   // [B 欄] 品名
            idx_qty: 9,  // [J 欄] 數量
            idx_batch: 10, // [K 欄] 批號
            idx_date: 11,   // [L 欄] 有效日期
        },
        // 冷藏牛設定
        beef: {
            fileName: "beef.csv",
            idx_name: 2,   // [C 欄] 品名
            idx_qty: 4,    // [E 欄] 庫存
            idx_batch: 0,  // [A 欄] 批號
            idx_date: 5,   // [F 欄] 有效日期
        }
    };
    /* ============================================================ */

    let currentAllData = []; 
    let currentFilteredData = []; 
    let currentPage = 1;
    let currentTab = 'frozen';
    const ROWS_PER_PAGE = 12;

    // 排序狀態追蹤
    let sortConfig = { key: null, direction: 'asc' }; 

    loadCSVData();

    // 封裝單一 CSV 讀取為 Promise
    function parseCSVPromise(settings, sourceName) {
        return new Promise((resolve) => {
            Papa.parse(settings.fileName, {
                download: true,
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    const mapped = results.data.slice(1).map(row => ({
                        name: row[settings.idx_name] || '',
                        qty: parseFloat(row[settings.idx_qty]) || 0,
                        batch: row[settings.idx_batch] || '-',
                        date: row[settings.idx_date] || '-',
                        source: sourceName
                    })).filter(item => item.name !== '');
                    resolve(mapped);
                },
                error: function() {
                    resolve([]); // 讀取失敗回傳空陣列，避免中斷整體執行
                }
            });
        });
    }

    function loadCSVData() {
        // 重置排序標記
        sortConfig = { key: null, direction: 'asc' };
        updateSortIcons();

        if (currentTab === 'warning') {
            // 同時讀取兩份 CSV 進行合併與 30 天效期篩選
            Promise.all([
                parseCSVPromise(CONFIG.frozen, '冷凍'),
                parseCSVPromise(CONFIG.chilled, '冷藏常溫')
            ]).then(([frozenData, chilledData]) => {
                const combined = [...frozenData, ...chilledData];
                const today = new Date();
                const warningLimit = 30 * 24 * 60 * 60 * 1000; // 30天毫秒數

                currentAllData = combined.filter(item => {
                    if (!item.date || item.date === '-') return false;
                    const expiryDate = new Date(item.date);
                    if (isNaN(expiryDate.getTime())) return false;
                    
                    const diff = expiryDate - today;
                    return diff <= warningLimit; // 包含 30 天內與已過期(<=0)
                });

                processSearchAndRender();
            });
        } else {
            // 一般頁籤讀取
            const settings = CONFIG[currentTab];
            Papa.parse(settings.fileName, {
                download: true,
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    currentAllData = results.data.slice(1).map(row => ({
                        name: row[settings.idx_name] || '',
                        qty: parseFloat(row[settings.idx_qty]) || 0,
                        batch: row[settings.idx_batch] || '-',
                        date: row[settings.idx_date] || '-'
                    })).filter(item => item.name !== '');

                    processSearchAndRender();
                },
                error: function() {
                    document.getElementById('inventoryBody').innerHTML = 
                        `<tr><td colspan="4" class="loading-msg" style="color:#ff4444;">❌ 找不到 ${settings.fileName} 檔案</td></tr>`;
                }
            });
        }
    }

    function processSearchAndRender() {
        // 取得關鍵字，移除所有空格並轉小寫，以便進行彈性比對
        const keyword = document.getElementById('searchInput').value.toLowerCase().replace(/\s+/g, '');
        
        // 1. 關鍵字篩選：將品名與批號合併，移除空格後與關鍵字比對
        let result = currentAllData.filter(item => {
            const combinedText = (item.name + item.batch).toLowerCase().replace(/\s+/g, '');
            return combinedText.includes(keyword);
        });

        // 2. 排序小工具處理邏輯
        if (sortConfig.key) {
            result.sort((a, b) => {
                let valA = a[sortConfig.key];
                let valB = b[sortConfig.key];
                
                // 如果是日期，轉換為時間戳比較
                if (sortConfig.key === 'date') {
                    const dA = new Date(valA).getTime() || 0;
                    const dB = new Date(valB).getTime() || 0;
                    return sortConfig.direction === 'asc' ? dA - dB : dB - dA;
                }
                
                // 一般字串（批號）比較
                return sortConfig.direction === 'asc' 
                    ? valA.localeCompare(valB, undefined, {numeric: true}) 
                    : valB.localeCompare(valA, undefined, {numeric: true});
            });
        }

        currentFilteredData = result;
        currentPage = 1;
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('inventoryBody');
        const start = (currentPage - 1) * ROWS_PER_PAGE;
        const pageData = currentFilteredData.slice(start, start + ROWS_PER_PAGE);

        if (pageData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="loading-msg">🔍 沒有符合搜尋條件的資料</td></tr>`;
        } else {
            const today = new Date();

            tbody.innerHTML = pageData.map(item => {
                let rowClass = ''; 

                // 檢查是否已過期
                if (item.date && item.date !== '-') {
                    const expiryDate = new Date(item.date);
                    const diff = expiryDate - today;
                    
                    if (diff <= 0) {
                        rowClass = 'class="expired-row"'; // 規則 5: 已過期列套用紅色+刪除線
                    }
                }

                // 檢查數量是否為 0 (優先順序若未過期則套用此項)
                if (item.qty === 0 && rowClass === '') {
                    rowClass = 'class="qty-zero-row"'; // 規則 4: 數量為 0 自動加上刪除線
                }

                return `
                <tr ${rowClass}>
                    <td>${item.name} ${item.source ? `<small style="color:var(--primary)">(${item.source})</small>` : ''}</td>
                    <td><span class="qty-tag ${item.qty <= 5 ? 'low-stock' : ''}">${item.qty}</span></td>
                    <td style="font-family: monospace;">${item.batch}</td>
                    <td style="color: var(--text-dim);">${item.date}</td>
                </tr>
                `;
            }).join('');
        }
        updatePagination();
    }

    // 觸發排序切換
    function toggleSort(key) {
        if (sortConfig.key === key) {
            sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
        } else {
            sortConfig.key = key;
            sortConfig.direction = 'asc';
        }
        updateSortIcons();
        processSearchAndRender();
    }

    // 更新排序箭頭
    function updateSortIcons() {
        const batchIcon = document.getElementById('sort-batch');
        const dateIcon = document.getElementById('sort-date');
        
        batchIcon.innerText = (sortConfig.key === 'batch') ? (sortConfig.direction === 'asc' ? '▲' : '▼') : '↕';
        dateIcon.innerText = (sortConfig.key === 'date') ? (sortConfig.direction === 'asc' ? '▲' : '▼') : '↕';
    }

    // 匯出效期預警資料為 Excel (CSV 格式與 BOM 處理防止亂碼)
    function exportToExcel() {
        if (currentTab !== 'warning' || currentAllData.length === 0) return;

        let csvContent = "\uFEFF"; // 加入 UTF-8 BOM 確保 Excel 開啟不亂碼
        csvContent += "來源庫別,品項,庫存,批號,有效日期\n";

        currentAllData.forEach(item => {
            let row = `"${item.source}","${item.name.replace(/"/g, '""')}",${item.qty},"${item.batch}","${item.date}"`;
            csvContent += row + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        
        link.setAttribute("href", url);
        link.setAttribute("download", `效期預警資料_${new Date().toISOString().slice(0,10)}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // 🟢 新增：頁面載入時檢查是否有網址參數
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const searchTerm = params.get('search');
        
        if (searchTerm) {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.value = decodeURIComponent(searchTerm);
                processSearchAndRender();
            }
        }
    });

    function updatePagination() {
        const totalPages = Math.ceil(currentFilteredData.length / ROWS_PER_PAGE) || 1;
        document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${totalPages} 頁`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === totalPages);
    }

    function handleSearch() {
        processSearchAndRender();
    }

    function changePage(step) {
        currentPage += step;
        renderTable();
    }

    function switchTab(tab) {
        if (currentTab === tab) return;
        currentTab = tab;
        
        document.getElementById('btn-frozen').classList.toggle('active', tab === 'frozen');
        document.getElementById('btn-chilled').classList.toggle('active', tab === 'chilled');
        document.getElementById('btn-beef').classList.toggle('active', tab === 'beef');
        document.getElementById('btn-warning').classList.toggle('active', tab === 'warning');
        
        // 僅在效期預警頁籤顯示匯出鈕
        document.getElementById('btn-export').style.display = (tab === 'warning') ? 'block' : 'none';

        document.getElementById('inventoryBody').innerHTML = `<tr><td colspan="4" class="loading-msg">切換中...</td></tr>`;
        loadCSVData();
    }
</script>

</body>
</html>
